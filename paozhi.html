<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>炮製學筆記 · 習醫手帖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:       #2C2825;
      --ink-mid:   #5C5047;
      --ink-light: #9C8E84;
      --parchment: #F7F3EE;
      --warm:      #EDE5D8;
      --rule:      #D5C9BA;
      --jade:      #2D6B4A;
      --jade-light:#4A9B6F;
      --active-bg: #E8F0EC;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif TC', serif;
      background: var(--parchment);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Top nav ── */
    .site-nav {
      background: var(--ink);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 52px;
    }
    .site-nav a {
      color: var(--rule);
      text-decoration: none;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: .85rem;
      letter-spacing: .08em;
      transition: color .2s;
    }
    .site-nav a:hover { color: var(--jade-light); }
    .site-nav .nav-current {
      color: var(--jade-light);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: .85rem;
      letter-spacing: .08em;
      cursor: default;
    }
    .site-nav .site-title {
      color: var(--jade-light);
      font-family: 'Noto Serif TC', serif;
      font-size: .95rem;
      font-weight: 500;
      margin-right: auto;
    }

    /* ── Page header ── */
    .page-header {
      border-bottom: 1px solid var(--rule);
      padding: 3rem 2rem 2rem;
      max-width: 900px;
      margin: 0 auto;
    }
    .page-header .eyebrow {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: .78rem;
      letter-spacing: .15em;
      color: var(--jade);
      margin-bottom: .6rem;
    }
    .page-header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: .05em;
      color: var(--ink);
      margin-bottom: .5rem;
    }
    .page-header .meta {
      font-size: .85rem;
      color: var(--ink-light);
      font-family: 'Noto Sans TC', sans-serif;
    }

    /* ── Layout ── */
    .layout {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 0;
      align-items: start;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: sticky;
      top: 1.5rem;
      padding: 2rem 1.5rem 2rem 0;
      border-right: 1px solid var(--rule);
    }
    .sidebar-label {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: .72rem;
      letter-spacing: .15em;
      color: var(--ink-light);
      margin-bottom: 1rem;
      padding-left: .75rem;
    }
    .sidebar nav { display: flex; flex-direction: column; gap: .2rem; }
    .sidebar nav button {
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      padding: .55rem .75rem;
      border-radius: 4px;
      font-family: 'Noto Serif TC', serif;
      font-size: .85rem;
      color: var(--ink-mid);
      line-height: 1.5;
      transition: background .15s, color .15s;
    }
    .sidebar nav button:hover {
      background: var(--warm);
      color: var(--ink);
    }
    .sidebar nav button.active {
      background: var(--active-bg);
      color: var(--jade);
      font-weight: 500;
      border-left: 2px solid var(--jade);
      padding-left: calc(.75rem - 2px);
    }

    /* ── Main content ── */
    .main { padding: 2rem 0 4rem 2.5rem; }

    .section { display: none; }
    .section.active { display: block; }

    /* ── Section header ── */
    .section-header {
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 2rem;
    }
    .section-header .tag {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: .75rem;
      letter-spacing: .12em;
      color: var(--jade);
      margin-bottom: .4rem;
    }
    .section-header h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: .04em;
    }

    /* ── Key box ── */
    .key-box {
      background: var(--warm);
      border-left: 3px solid var(--jade);
      padding: 1rem 1.4rem;
      margin: 1.5rem 0;
      border-radius: 0 4px 4px 0;
    }
    .key-box .key-label {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: .72rem;
      letter-spacing: .12em;
      color: var(--jade);
      margin-bottom: .5rem;
    }
    .key-box .key-text {
      font-size: .95rem;
      line-height: 2;
      color: var(--ink);
      font-weight: 500;
    }

    /* ── Prose ── */
    .prose p {
      font-size: .95rem;
      line-height: 2;
      color: var(--ink);
      margin-bottom: 1.2rem;
      text-indent: 2em;
    }
    .prose p:last-child { margin-bottom: 0; }

    /* ── Table ── */
    .note-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
    }
    .note-table th, .note-table td {
      border: 1px solid var(--rule);
      padding: .8rem 1rem;
      font-size: .88rem;
      line-height: 1.9;
      vertical-align: top;
    }
    .note-table th {
      background: var(--warm);
      font-weight: 500;
      color: var(--jade);
      font-family: 'Noto Sans TC', sans-serif;
      letter-spacing: .06em;
      width: 25%;
    }
    .note-table td { color: var(--ink); }

    /* ── Sub heading ── */
    .sub-heading {
      font-size: .85rem;
      font-weight: 500;
      color: var(--jade);
      letter-spacing: .08em;
      margin: 2rem 0 .8rem;
      font-family: 'Noto Sans TC', sans-serif;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        border-right: none;
        border-bottom: 1px solid var(--rule);
        padding: 1.5rem 0 1rem;
      }
      .sidebar nav { flex-direction: row; flex-wrap: wrap; gap: .4rem; }
      .sidebar nav button { font-size: .8rem; padding: .4rem .6rem; }
      .main { padding: 1.5rem 0 3rem; }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <span class="site-title">習醫手帖</span>
  <a href="index.html">首頁</a>
  <span class="nav-current">炮製學</span>

    <!-- 煆法 -->

    <!-- 其他製法 -->
    <div class="section" id="s6">

    </div>

  </main>
</div>

<script>
  function show(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.sidebar nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>

</body>
</html>
