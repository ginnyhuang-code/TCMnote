<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>習醫手帖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
  <script src="search-index.js"></script>
  <style>
    :root {
      --green-dark: #2D5A3D;
      --green-mid: #3D7A52;
      --green-light: #5A9E6F;
      --green-pale: #E8F2EC;
      --parchment: #FAF7F2;
      --ink: #1E2A1E;
      --ink-light: #4A5A4A;
      --rule: #C8D8C8;
      --white: #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--parchment); color: var(--ink); line-height: 1.8; }

    .site-nav {
      background: var(--green-dark); padding: .9rem 2rem;
      display: flex; align-items: center; gap: 1.2rem;
      position: sticky; top: 0; z-index: 100;
    }
    .site-nav .site-title { font-family: 'Noto Serif TC', serif; font-weight: 700; color: #fff; font-size: 1.05rem; }
    .site-nav a { color: rgba(255,255,255,.75); text-decoration: none; font-size: .9rem; }
    .site-nav a:hover { color: #fff; }

    .hero {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
      color: #fff; padding: 3.5rem 2rem 3rem; text-align: center;
    }
    .hero h1 { font-family: 'Noto Serif TC', serif; font-size: 2.2rem; font-weight: 700; margin-bottom: .6rem; }
    .hero p { opacity: .8; font-size: .95rem; margin-bottom: 2rem; }

    .search-wrap { max-width: 560px; margin: 0 auto; position: relative; }
    .search-wrap input {
      width: 100%; padding: .85rem 1.2rem .85rem 3rem;
      border: none; border-radius: 8px;
      font-size: 1rem; font-family: 'Noto Sans TC', sans-serif;
      outline: none; background: #fff; color: var(--ink);
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
    }
    .search-wrap input::placeholder { color: #aaa; }
    .search-icon {
      position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
      color: var(--green-mid); font-size: 1.1rem; pointer-events: none;
    }

    .search-results {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: #fff; border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,.15);
      max-height: 420px; overflow-y: auto;
      z-index: 200; display: none;
    }
    .search-results.active { display: block; }
    .result-item {
      display: flex; align-items: flex-start; gap: .8rem;
      padding: .8rem 1.2rem; border-bottom: 1px solid var(--rule);
      text-decoration: none; color: var(--ink);
      transition: background .15s;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item:hover { background: var(--green-pale); }
    .result-main { flex: 1; min-width: 0; }
    .result-title { font-weight: 700; font-size: .9rem; color: var(--green-dark); }
    .result-snippet { font-size: .78rem; color: var(--ink-light); margin-top: .2rem; line-height: 1.5; }
    .result-tag { font-size: .72rem; color: var(--green-mid); background: var(--green-pale); padding: .1rem .5rem; border-radius: 4px; display: inline-block; margin-top: .3rem; }
    .result-empty { padding: 1.2rem; text-align: center; color: var(--ink-light); font-size: .88rem; }

    .content { max-width: 900px; margin: 2.5rem auto 4rem; padding: 0 2rem; }
    .section-title {
      font-family: 'Noto Serif TC', serif; font-size: .95rem; font-weight: 700;
      color: var(--ink-light); margin-bottom: 1rem; padding-bottom: .4rem;
      border-bottom: 1px solid var(--rule);
    }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.2rem; margin-bottom: 2.5rem; }
    .card {
      display: block; background: var(--white); border: 1px solid var(--rule);
      border-radius: 10px; padding: 1.4rem; text-decoration: none; color: var(--ink);
      transition: box-shadow .2s, transform .2s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(45,90,61,.12); transform: translateY(-2px); }
    .card-emoji { font-size: 1.6rem; margin-bottom: .5rem; }
    .card-title { font-family: 'Noto Serif TC', serif; font-size: 1rem; font-weight: 700; color: var(--green-dark); margin-bottom: .4rem; }
    .card-desc { font-size: .82rem; color: var(--ink-light); line-height: 1.6; margin-bottom: .6rem; }
    .card-count { font-size: .75rem; color: var(--green-mid); }
    .card.disabled { opacity: .55; pointer-events: none; }
    .card-soon { font-size: .72rem; color: #aaa; background: #f0f0f0; padding: .1rem .5rem; border-radius: 4px; display: inline-block; }

    .site-footer { text-align: center; padding: 1.5rem; font-size: .8rem; color: var(--ink-light); border-top: 1px solid var(--rule); }

    mark { background: #d4edda; border-radius: 2px; padding: 0 1px; }
  </style>
</head>
<body>

<nav class="site-nav">
  <span class="site-title">習醫手帖</span>
  <a href="index.html">首頁</a>
</nav>

<div class="hero">
  <h1>習醫手帖</h1>
  <p>記錄習醫路上的點滴・讀書、跟診、期刊、醫案</p>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜尋方劑、藥物、症狀、章節…" autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<div class="content">
  <div class="section-title">筆記分類</div>
  <div class="cards">
    <a class="card" href="reading.html">
      <div class="card-emoji">📚</div>
      <div class="card-title">讀書筆記</div>
      <div class="card-desc">中醫經典與教材的閱讀整理，記錄重要理論與藥物知識。</div>
      <div class="card-count">3 個科目</div>
    </a>
    <a class="card" href="jenzhen.html">
      <div class="card-emoji">🏥</div>
      <div class="card-title">跟診筆記</div>
      <div class="card-desc">跟隨老師臨床診治的觀察記錄與學習心得。</div>
    </a>
    <div class="card disabled">
      <div class="card-emoji">📄</div>
      <div class="card-title">期刊筆記</div>
      <div class="card-desc">中西醫相關期刊文獻的閱讀摘要與評析。</div>
      <div class="card-soon">即將新增</div>
    </div>
    <div class="card disabled">
      <div class="card-emoji">📋</div>
      <div class="card-title">醫案體悟</div>
      <div class="card-desc">臨床病案記錄與診治過程中的思考與體悟。</div>
      <div class="card-soon">即將新增</div>
    </div>
  </div>
</div>

<footer class="site-footer">習醫手帖・中醫學習筆記</footer>

<script>
const input = document.getElementById('searchInput');
const resultsBox = document.getElementById('searchResults');

function getSnippet(text, kw) {
  const idx = text.toLowerCase().indexOf(kw.toLowerCase());
  if (idx === -1) return text.slice(0, 80) + '…';
  const start = Math.max(0, idx - 30);
  const end = Math.min(text.length, idx + kw.length + 60);
  return (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
}

function highlight(text, kw) {
  if (!kw) return text;
  const re = new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function search(q) {
  if (!q.trim()) { resultsBox.classList.remove('active'); return; }
  const kw = q.trim();
  const kwLower = kw.toLowerCase();

  const matched = SEARCH_INDEX.filter(item =>
    item.title.toLowerCase().includes(kwLower) ||
    item.text.toLowerCase().includes(kwLower) ||
    item.cat.toLowerCase().includes(kwLower)
  );

  // 排序：標題命中優先
  matched.sort((a, b) => {
    const aTitle = a.title.toLowerCase().includes(kwLower);
    const bTitle = b.title.toLowerCase().includes(kwLower);
    return bTitle - aTitle;
  });

  renderResults(matched, kw);
}

function renderResults(items, kw) {
  resultsBox.innerHTML = '';
  if (items.length === 0) {
    resultsBox.innerHTML = '<div class="result-empty">找不到相關內容</div>';
    resultsBox.classList.add('active');
    return;
  }
  items.slice(0, 10).forEach(item => {
    const snippet = getSnippet(item.text, kw);
    const a = document.createElement('a');
    a.className = 'result-item';
    a.href = item.url;
    a.innerHTML = `
      <div class="result-main">
        <div class="result-title">${highlight(item.title, kw)}</div>
        <div class="result-snippet">${highlight(snippet, kw)}</div>
        <span class="result-tag">${item.cat}</span>
      </div>`;
    resultsBox.appendChild(a);
  });
  resultsBox.classList.add('active');
}

input.addEventListener('input', e => search(e.target.value));
input.addEventListener('focus', e => { if (e.target.value) search(e.target.value); });
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) resultsBox.classList.remove('active');
});
input.addEventListener('keydown', e => {
  if (e.key === 'Escape') { resultsBox.classList.remove('active'); input.blur(); }
});
</script>
</body>
</html>
