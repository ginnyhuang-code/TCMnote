<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>習醫手帖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:        #2C2825;
      --ink-mid:    #5C5047;
      --ink-light:  #9C8E84;
      --parchment:  #F5F2ED;
      --warm:       #EAE4D8;
      --rule:       #D0C8B8;
      --green:      #2D5A3D;
      --green-light:#4A7A5A;
      --green-pale: #E8F0EB;
      --green-mid:  #C8DDD0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Serif TC', serif; background: var(--parchment); color: var(--ink); min-height: 100vh; }
    .site-nav { background: var(--green); padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 52px; }
    .site-nav .site-title { color: var(--green-mid); font-family: 'Noto Serif TC', serif; font-size: 1.05rem; font-weight: 500; margin-right: auto; letter-spacing: .06em; }
    .site-nav .nav-current { color: #fff; font-family: 'Noto Sans TC', sans-serif; font-size: .95rem; letter-spacing: .08em; }
    .hero { max-width: 700px; margin: 0 auto; padding: 5rem 2rem 3rem; text-align: center; }
    .hero .eyebrow { font-family: 'Noto Sans TC', sans-serif; font-size: .88rem; letter-spacing: .2em; color: var(--green-light); margin-bottom: 1.2rem; }
    .hero h1 { font-size: 2.7rem; font-weight: 700; letter-spacing: .08em; color: var(--ink); margin-bottom: 1rem; }
    .hero .desc { font-size: 1.05rem; color: var(--ink-light); line-height: 2; font-family: 'Noto Sans TC', sans-serif; }
    .hero-rule { width: 60px; height: 1px; background: var(--green); margin: 2.5rem auto; opacity: .4; }
    .categories { max-width: 860px; margin: 0 auto; padding: 0 2rem 6rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.5rem; }
    .cat-card { background: #fff; border: 1px solid var(--rule); border-radius: 8px; padding: 2rem; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: .6rem; transition: box-shadow .2s, transform .2s, border-color .2s; }
    .cat-card:hover { box-shadow: 0 4px 20px rgba(45,90,61,.1); transform: translateY(-2px); border-color: var(--green-light); }
    .cat-card.coming { opacity: .55; cursor: default; pointer-events: none; background: var(--warm); }
    .cat-icon { font-size: 1.8rem; }
    .cat-title { font-size: 1.2rem; font-weight: 700; color: var(--ink); letter-spacing: .04em; }
    .cat-desc { font-family: 'Noto Sans TC', sans-serif; font-size: .9rem; color: var(--ink-light); line-height: 1.7; }
    .cat-count { font-family: 'Noto Sans TC', sans-serif; font-size: .8rem; color: var(--green-light); margin-top: .4rem; }
    .coming-badge { font-family: 'Noto Sans TC', sans-serif; font-size: .78rem; color: var(--ink-light); background: var(--parchment); border: 1px solid var(--rule); border-radius: 20px; padding: .2rem .7rem; display: inline-block; margin-top: .2rem; align-self: flex-start; }
    .site-footer { border-top: 1px solid var(--rule); padding: 1.5rem 2rem; text-align: center; font-family: 'Noto Sans TC', sans-serif; font-size: .85rem; color: var(--ink-light); letter-spacing: .06em; }
    @media (max-width: 480px) { .hero h1 { font-size: 2rem; } .categories { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<nav class="site-nav">
  <span class="site-title">習醫手帖</span>
  <span class="nav-current">首頁</span>
</nav>
<div class="hero">
  <div class="eyebrow">中醫學習筆記</div>
  <h1>習醫手帖</h1>
  <div class="desc">記錄習醫路上的點滴<br>讀書、跟診、期刊、醫案</div>
  <div class="hero-rule"></div>
</div>
<div class="categories">
  <a class="cat-card" href="reading.html">
    <div class="cat-icon">📚</div>
    <div class="cat-title">讀書筆記</div>
    <div class="cat-desc">中醫經典與教材的閱讀整理，記錄重要理論與藥物知識。</div>
    <div class="cat-count">3 篇</div>
  </a>
  <a class="cat-card" href="jenzhen.html">
    <div class="cat-icon">🏥</div>
    <div class="cat-title">跟診筆記</div>
    <div class="cat-desc">跟隨老師臨床診治的觀察記錄與學習心得。</div>
  </a>
  <div class="cat-card coming">
    <div class="cat-icon">📄</div>
    <div class="cat-title">期刊筆記</div>
    <div class="cat-desc">中西醫相關期刊文獻的閱讀摘要與評析。</div>
    <div class="coming-badge">即將新增</div>
  </div>
  <div class="cat-card coming">
    <div class="cat-icon">📋</div>
    <div class="cat-title">醫案體悟</div>
    <div class="cat-desc">臨床病案記錄與診治過程中的思考與體悟。</div>
    <div class="coming-badge">即將新增</div>
  </div>
</div>
<footer class="site-footer">習醫手帖・中醫學習筆記</footer>
<script>
  const count = localStorage.getItem('readingCount');
  if (count) {
    document.querySelector('a[href="reading.html"] .cat-count').textContent = count + ' 篇';
  }
</script>
</body>
</html>
