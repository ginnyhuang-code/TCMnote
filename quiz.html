<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --green-dark:#2D5A3D; --green-mid:#3D7A52; --green-light:#5A9E6F;
  --green-pale:#E8F2EC; --parchment:#FAF7F2; --warm:#F2ECE0;
  --ink:#1E2A1E; --ink-light:#6E7A6E; --rule:#D8D0C2;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Serif TC',serif;background:var(--parchment);color:var(--ink);min-height:100vh;}

.site-nav{background:var(--green-dark);padding:0 1.6rem;display:flex;align-items:center;gap:1.4rem;height:52px;flex-wrap:wrap;}
.site-nav .site-title{color:var(--green-pale);font-size:1.05rem;font-weight:500;letter-spacing:.06em;margin-right:auto;}
.site-nav a{color:#cfe3d6;text-decoration:none;font-family:'Noto Sans TC',sans-serif;font-size:.9rem;}
.site-nav a:hover{color:#fff;}

.breadcrumb{max-width:960px;margin:0 auto;padding:1.1rem 1.6rem .2rem;font-family:'Noto Sans TC',sans-serif;font-size:.84rem;color:var(--ink-light);}
.breadcrumb a{color:var(--green-light);text-decoration:none;}
.breadcrumb a:hover{text-decoration:underline;}
.breadcrumb span{margin:0 .4rem;opacity:.6;}

.page-header{max-width:960px;margin:0 auto;padding:.6rem 1.6rem 1.4rem;}
.page-header .eyebrow{font-family:'Noto Sans TC',sans-serif;font-size:.82rem;letter-spacing:.18em;color:var(--green-light);margin-bottom:.5rem;}
.page-header h1{font-size:2rem;font-weight:700;letter-spacing:.06em;color:var(--ink);}
.page-header .lead{font-family:'Noto Sans TC',sans-serif;font-size:.92rem;color:var(--ink-light);margin-top:.6rem;line-height:1.7;}
.hr{max-width:960px;margin:0 auto;border-top:1px solid var(--rule);}

.grid{max-width:960px;margin:0 auto;padding:1.6rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.1rem;}
.card{display:flex;flex-direction:column;background:#fff;border:1px solid var(--rule);border-radius:10px;padding:1.4rem 1.5rem;text-decoration:none;color:inherit;transition:all .18s;position:relative;overflow:hidden;}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green-mid);opacity:.85;}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(45,90,61,.14);border-color:var(--green-light);}
.card .c-icon{font-size:1.7rem;margin-bottom:.7rem;}
.card .c-title{font-size:1.3rem;font-weight:700;letter-spacing:.04em;color:var(--green-dark);}
.card .c-desc{font-family:'Noto Sans TC',sans-serif;font-size:.88rem;color:var(--ink-light);line-height:1.7;margin-top:.6rem;flex:1;}
.card .c-meta{font-family:'Noto Sans TC',sans-serif;font-size:.78rem;color:var(--green-mid);margin-top:1rem;letter-spacing:.06em;}

.site-footer{border-top:1px solid var(--rule);padding:1.5rem 2rem;text-align:center;font-family:'Noto Sans TC',sans-serif;font-size:.85rem;color:var(--ink-light);letter-spacing:.06em;}
@media (max-width:480px){.page-header h1{font-size:1.7rem;}.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav class="site-nav">

</nav>

<div class="breadcrumb"><a href="index.html">首頁</a><span>›</span>隨堂測驗</div>

<div class="page-header">

  <h1>隨堂測驗</h1>
  <div class="lead">把讀過的條文與重點變成互動小測驗，填空與翻卡兩種模式，邊玩邊記。</div>
</div>
<div class="hr"></div>

<div class="grid">
  <a class="card" href="quiz_shanghan.html">
    <div class="c-icon">📜</div>
    <div class="c-title">傷寒論條文</div>

    <div class="c-meta">398 條 · 填空 / 卡片</div>
  </a>
</div>

<footer class="site-footer">習醫手帖・中醫學習筆記</footer>
</body>
</html>
