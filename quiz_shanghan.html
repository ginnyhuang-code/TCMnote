<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>傷寒論條文 — 習醫手帖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#efe8da;--paper-2:#faf7f2;--paper-3:#ffffff;
    --ink:#1e2a1e;--ink-soft:#4a5a4a;--ink-faint:#6e7a6e;
    --pine:#2d5a3d;--pine-2:#3d7a52;--pine-line:#5a9e6f;
    --cinnabar:#bc3b24;--gold:#9c7a30;--shadow:rgba(30,42,30,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Noto Sans TC",sans-serif;color:var(--ink);
    background:radial-gradient(circle at 18% 12%,rgba(255,255,255,.35),transparent 40%),
      radial-gradient(circle at 85% 88%,rgba(120,90,40,.10),transparent 45%),var(--paper);
    min-height:100vh;line-height:1.6;display:flex;justify-content:center;padding:16px 12px 44px;
  }
  .wrap{width:100%;max-width:620px;}
  header{text-align:center;margin-bottom:14px;}
  .kicker{font-size:.7rem;letter-spacing:.5em;color:var(--pine);font-weight:500;padding-left:.5em;}
  h1{font-family:"Noto Serif TC",serif;font-weight:900;font-size:1.95rem;letter-spacing:.1em;margin:.15em 0 .1em;}
  .sub{font-size:.78rem;color:var(--ink-soft);letter-spacing:.06em;}
  .rule{height:0;border-top:2px solid var(--pine-line);margin:12px auto 0;max-width:120px;position:relative;}
  .rule::after{content:"";position:absolute;left:50%;top:-4px;transform:translateX(-50%);width:8px;height:8px;background:var(--cinnabar);border-radius:2px;rotate:45deg;}

  .tabs{display:flex;gap:8px;margin:14px 0 10px;}
  .tab{flex:1;padding:10px 6px;border:1.5px solid var(--pine-line);background:transparent;color:var(--pine);
    font-family:"Noto Serif TC",serif;font-weight:600;font-size:.95rem;letter-spacing:.16em;border-radius:4px;cursor:pointer;transition:all .18s;}
  .tab.active{background:var(--pine);color:var(--paper-3);}

  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;justify-content:center;}
  .chip{padding:5px 12px;border:1px solid var(--pine-line);background:var(--paper-2);color:var(--pine);
    font-family:"Noto Serif TC",serif;font-size:.85rem;letter-spacing:.08em;border-radius:20px;cursor:pointer;transition:all .15s;}
  .chip.active{background:var(--cinnabar);border-color:var(--cinnabar);color:#fff;}
  .chip .cnt{font-size:.7rem;opacity:.7;margin-left:3px;}

  .card{background:var(--paper-2);border:1.5px solid var(--pine-line);border-radius:6px;padding:18px 18px 20px;
    box-shadow:0 6px 20px var(--shadow);position:relative;}
  .card::before{content:"";position:absolute;inset:5px;border:1px solid rgba(58,91,77,.35);border-radius:3px;pointer-events:none;}
  .eyebrow{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap;font-family:"Noto Serif TC",serif;margin-bottom:12px;position:relative;z-index:1;}
  .eyebrow .meridian{font-size:1rem;font-weight:700;color:var(--pine);letter-spacing:.1em;}
  .eyebrow .num{margin-left:auto;font-size:.76rem;color:var(--cinnabar);font-weight:600;letter-spacing:.12em;border:1px solid var(--cinnabar);padding:1px 8px;border-radius:3px;}

  .passage{font-family:"Noto Serif TC",serif;font-size:1.26rem;line-height:2.1;letter-spacing:.03em;position:relative;z-index:1;text-align:justify;}
  .passage .dot{color:var(--cinnabar);font-weight:700;opacity:.82;}
  .blank{display:inline-flex;flex-wrap:wrap;gap:3px;vertical-align:-3px;margin:0 2px;}
  .cell{width:1.5em;height:1.5em;border:1.3px solid var(--pine-line);display:inline-flex;align-items:center;justify-content:center;
    background:linear-gradient(rgba(58,91,77,.22),rgba(58,91,77,.22)) center/100% 1px no-repeat,
      linear-gradient(90deg,rgba(58,91,77,.22),rgba(58,91,77,.22)) center/1px 100% no-repeat,var(--paper-3);
    font-family:"Noto Serif TC",serif;font-size:1.02em;border-radius:2px;transition:all .3s;}
  .blank.filled .cell{border-color:var(--pine);animation:inkIn .4s ease both;}
  .blank.filled .cell:nth-child(n+2){animation-delay:.06s;}
  @keyframes inkIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}

  .options{display:grid;gap:9px;margin-top:18px;position:relative;z-index:1;}
  .opt{text-align:left;padding:12px 15px;border:1.5px solid var(--pine-line);background:var(--paper-3);color:var(--ink);
    border-radius:5px;cursor:pointer;font-family:"Noto Serif TC",serif;font-size:1.08rem;letter-spacing:.02em;transition:all .15s;line-height:1.5;}
  .opt:hover:not(:disabled){background:#fff;transform:translateX(2px);}
  .opt:disabled{cursor:default;}
  .opt.correct{border-color:var(--pine);background:rgba(34,64,53,.12);color:var(--pine);font-weight:600;}
  .opt.wrong{border-color:var(--cinnabar);background:rgba(188,59,36,.08);color:var(--cinnabar);animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

  .seal{position:absolute;top:12px;right:14px;z-index:3;width:52px;height:52px;border:2.5px solid var(--cinnabar);
    color:var(--cinnabar);border-radius:5px;display:flex;align-items:center;justify-content:center;
    font-family:"Noto Serif TC",serif;font-weight:700;font-size:.88rem;line-height:1.05;text-align:center;
    opacity:0;transform:scale(1.8) rotate(-18deg);pointer-events:none;background:rgba(188,59,36,.05);}
  .seal.show{animation:stamp .45s cubic-bezier(.2,1.4,.4,1) forwards;}
  @keyframes stamp{0%{opacity:0;transform:scale(1.9) rotate(-20deg);}60%{opacity:1;transform:scale(.92) rotate(-9deg);}100%{opacity:.92;transform:scale(1) rotate(-9deg);}}

  .bar{display:flex;align-items:center;gap:14px;margin-top:14px;font-size:.82rem;color:var(--ink-soft);}
  .score b{color:var(--pine);font-size:1.05rem;}
  .streak b{color:var(--cinnabar);font-size:1.05rem;}
  .next{margin-left:auto;padding:9px 20px;border:none;border-radius:5px;background:var(--pine);color:var(--paper-3);
    font-family:"Noto Serif TC",serif;font-weight:600;font-size:1rem;letter-spacing:.16em;cursor:pointer;transition:all .15s;opacity:.35;pointer-events:none;}
  .next.ready{opacity:1;pointer-events:auto;}
  .next.ready:hover{background:var(--pine-2);}

  .flash{background:var(--paper-2);border:1.5px solid var(--pine-line);border-radius:6px;min-height:260px;
    padding:24px 20px;box-shadow:0 6px 20px var(--shadow);position:relative;cursor:pointer;display:flex;flex-direction:column;justify-content:center;}
  .flash::before{content:"";position:absolute;inset:5px;border:1px solid rgba(58,91,77,.35);border-radius:3px;pointer-events:none;}
  .flash .fmeta{font-family:"Noto Serif TC",serif;color:var(--pine);font-weight:700;font-size:1.1rem;letter-spacing:.1em;position:relative;z-index:1;}
  .flash .fnum{font-size:.76rem;color:var(--cinnabar);letter-spacing:.12em;position:relative;z-index:1;margin-top:4px;}
  .flash .fbody{font-family:"Noto Serif TC",serif;font-size:1.24rem;line-height:2.05;letter-spacing:.03em;margin-top:14px;position:relative;z-index:1;text-align:justify;}
  .flash .fbody .dot{color:var(--cinnabar);opacity:.82;}
  .flash .ftip{position:absolute;bottom:11px;left:50%;transform:translateX(-50%);font-size:.72rem;color:var(--ink-faint);letter-spacing:.16em;z-index:1;}
  .fnav{display:flex;align-items:center;gap:9px;margin-top:14px;}
  .fnav button{flex:1;padding:11px;border:1.5px solid var(--pine-line);background:transparent;color:var(--pine);
    font-family:"Noto Serif TC",serif;font-weight:600;font-size:1rem;letter-spacing:.12em;border-radius:5px;cursor:pointer;transition:all .15s;}
  .fnav button:hover{background:var(--pine);color:var(--paper-3);}
  .fcount{font-size:.8rem;color:var(--ink-soft);letter-spacing:.08em;font-family:"Noto Serif TC",serif;min-width:66px;text-align:center;}
  .jump{display:flex;gap:6px;margin-top:10px;align-items:center;justify-content:center;font-size:.8rem;color:var(--ink-soft);}
  .jump input{width:64px;padding:6px 8px;border:1.5px solid var(--pine-line);border-radius:4px;background:var(--paper-3);
    font-family:"Noto Serif TC",serif;font-size:.95rem;text-align:center;color:var(--ink);}
  .jump button{padding:6px 12px;border:1.5px solid var(--pine-line);background:transparent;color:var(--pine);
    font-family:"Noto Serif TC",serif;border-radius:4px;cursor:pointer;}

  .hidden{display:none;}
  .foot-note{margin-top:20px;font-size:.7rem;color:var(--ink-faint);line-height:1.7;text-align:center;letter-spacing:.02em;}
  .foot-note b{color:var(--ink-soft);}
  @media (max-width:400px){h1{font-size:1.65rem;}.passage{font-size:1.14rem;}.opt{font-size:1rem;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
  :focus-visible{outline:2.5px solid var(--cinnabar);outline-offset:2px;}

  /* 習醫手帖外框 */
  body{display:block!important;padding:0!important;}
  .wrap{margin:0 auto;padding:18px 14px 48px;}
  .site-nav{background:var(--pine);height:52px;display:flex;align-items:center;gap:1.4rem;padding:0 1.4rem;flex-wrap:wrap;}
  .site-nav .site-title{color:var(--paper-2);font-family:'Noto Serif TC',serif;font-size:1.05rem;font-weight:500;letter-spacing:.06em;margin-right:auto;}
  .site-nav a{color:#cfe3d6;text-decoration:none;font-family:'Noto Sans TC',sans-serif;font-size:.9rem;}
  .site-nav a:hover{color:#fff;}
  .crumb{max-width:620px;margin:0 auto;padding:14px 14px 2px;font-family:'Noto Sans TC',sans-serif;font-size:.82rem;color:var(--ink-faint);}
  .crumb a{color:var(--pine-2);text-decoration:none;}
  .crumb a:hover{text-decoration:underline;}
  .crumb span{margin:0 .4rem;opacity:.6;}
</style>
</head>

<div class="wrap">
  <header>
    <div class="kicker">張仲景・宋本・趙開美本</div>
    <h1>傷寒論・全條文</h1>
    <div class="sub">三九八條　填空與卡片複習</div>
    <div class="rule"></div>
  </header>

  <div class="tabs">
    <button class="tab active" id="tabFill">填空挑戰</button>
    <button class="tab" id="tabFlash">卡片複習</button>
  </div>

  <div class="chips" id="chips"></div>

  <section id="fillMode">
    <div class="card">
      <div class="seal" id="seal">正<br>解</div>
      <div class="eyebrow">
        <span class="meridian" id="fMeridian">太陽</span>
        <span class="num" id="fNum">第1條</span>
      </div>
      <div class="passage" id="passage"></div>
      <div class="options" id="options"></div>
    </div>
    <div class="bar">
      <span class="score">答對 <b id="scoreN">0</b> ／ <span id="totalN">0</span></span>
      <span class="streak">連中 <b id="streakN">0</b></span>
      <button class="next" id="nextBtn">下一題</button>
    </div>
  </section>

  <section id="flashMode" class="hidden">
    <div class="flash" id="flashCard">
      <div class="fmeta" id="flMeridian"></div>
      <div class="fnum" id="flNum"></div>
      <div class="fbody" id="flBody"></div>
      <div class="ftip" id="flTip">點卡片　顯示原文</div>
    </div>
    <div class="fnav">
      <button id="flPrev">上一則</button>
      <span class="fcount" id="flCount">1 / 1</span>
      <button id="flNext">下一則</button>
    </div>
    <div class="jump">
      跳至第 <input id="flJump" type="number" min="1" max="398" placeholder="條號"> 條
      <button id="flGo">前往</button>
    </div>
  </section>

  <p class="foot-note">
    底本：<b>趙開美本（明萬曆己亥翻刻宋版），李宇銘博士校訂</b>。<br>
    僅取條文主文（略去藥物組成、煎服法、校注），古字已正常化為通行繁體。<br>
    如與你的底本有出入，以你的底本為準。
  </p>
</div>

<script>
const DATA = [{"n": 1, "j": "太陽", "t": "太陽之為病，脈浮、頭項強痛而惡寒。"}, {"n": 2, "j": "太陽", "t": "太陽病，發熱、汗出、惡風、脈緩者，名為中風。"}, {"n": 3, "j": "太陽", "t": "太陽病，或已發熱，或未發熱，必惡寒、體痛、嘔逆、脈陰陽俱緊者，名為傷寒。"}, {"n": 4, "j": "太陽", "t": "傷寒一日，太陽受之。脈若靜者，為不傳；頗欲吐，若躁煩，脈數急者，為傳也。"}, {"n": 5, "j": "太陽", "t": "傷寒二三日，陽明、少陽證不見者，為不傳也。"}, {"n": 6, "j": "太陽", "t": "太陽病，發熱而渴，不惡寒者，為溫病。若發汗已，身灼熱者，名風溫。風溫為病，脈陰陽俱浮、自汗出、身重、多眠睡、鼻息必鼾、語言難出；若被下者，小便不利、直視失溲；若被火者，微發黃色，劇則如驚癇，時瘛疭；若火熏之，一逆尚引日，再逆促命期。"}, {"n": 7, "j": "太陽", "t": "病有發熱惡寒者；發于陽也；無熱惡寒者，發于陰也。發于陽，七日愈；發于陰，六日愈。以陽數七、陰數六故也。"}, {"n": 8, "j": "太陽", "t": "太陽病，頭痛至七日以上自愈者，以行其經盡故也。若欲作再經者，針足陽明，使經不傳則愈。"}, {"n": 9, "j": "太陽", "t": "太陽病欲解時，從巳至未上。"}, {"n": 10, "j": "太陽", "t": "風家，表解而不了了者，十二日愈。"}, {"n": 11, "j": "太陽", "t": "病人身大熱，反欲得衣者，熱在皮膚，寒在骨髓也；身大寒，反不欲近衣者，寒在皮膚，熱在骨髓也。"}, {"n": 12, "j": "太陽", "t": "太陽中風，陽浮而陰弱，陽浮者，熱自發；陰弱者，汗自出。嗇嗇惡寒，淅淅惡風，翕翕發熱，鼻鳴乾嘔者，桂枝湯主之。"}, {"n": 13, "j": "太陽", "t": "太陽病，頭痛、發熱、汗出、惡風，桂枝湯主之。"}, {"n": 14, "j": "太陽", "t": "太陽病，項背強几几，反汗出惡風者，桂枝加葛根湯主之。"}, {"n": 15, "j": "太陽", "t": "太陽病，下之後，其氣上衝者，可與桂枝湯，方用前法；若不上衝者，不得與之。"}, {"n": 16, "j": "太陽", "t": "太陽病三日，已發汗，若吐、若下、若溫針，仍不解者，此為壞病，桂枝不中與之也。觀其脈證，知犯何逆，隨證治之。桂枝本為解肌，若其人脈浮緊、發熱汗不出者，不可與之也。常須識此，勿令誤也。"}, {"n": 17, "j": "太陽", "t": "若酒客病，不可與桂枝湯，得之則嘔，以酒客不喜甘故也。"}, {"n": 18, "j": "太陽", "t": "喘家作桂枝湯，加厚朴、杏子佳。"}, {"n": 19, "j": "太陽", "t": "凡服桂枝湯吐者，其後必吐膿血也。"}, {"n": 20, "j": "太陽", "t": "太陽病，發汗，遂漏不止，其人惡風，小便難，四肢微急，難以屈伸者，桂枝加附子湯主之。"}, {"n": 21, "j": "太陽", "t": "太陽病，下之後，脈促、胸滿者，桂枝去芍藥湯主之。"}, {"n": 22, "j": "太陽", "t": "若微寒者，桂枝去芍藥加附子湯主之。"}, {"n": 23, "j": "太陽", "t": "太陽病，得之八九日，如瘧狀，發熱惡寒，熱多寒少，其人不嘔，清便欲自可，一日二三度發。脈微緩者，為欲愈也；脈微而惡寒者，此陰陽俱虛，不可更發汗、更下、更吐也；面色反有熱色者，未欲解也，以其不能得小汗出，身必癢，宜桂枝麻黃各半湯。"}, {"n": 24, "j": "太陽", "t": "太陽病，初服桂枝湯，反煩，不解者，先刺風池、風府，卻與桂枝湯則愈。"}, {"n": 25, "j": "太陽", "t": "服桂枝湯，大汗出，脈洪大者，與桂枝湯，如前法。若形似瘧，一日再發者，汗出必解，宜桂枝二麻黃一湯。"}, {"n": 26, "j": "太陽", "t": "服桂枝湯，大汗出後，大煩渴不解，脈洪大者，白虎加人參湯主之。"}, {"n": 27, "j": "太陽", "t": "太陽病，發熱惡寒，熱多寒少，脈微弱者，此無陽也。不可發汗，宜桂枝二越婢一湯。"}, {"n": 28, "j": "太陽", "t": "服桂枝湯，或下之，仍頭項強痛、翕翕發熱、無汗、心下滿微痛、小便不利者，桂枝去桂加茯苓白朮湯主之。"}, {"n": 29, "j": "太陽", "t": "傷寒脈浮、自汗出、小便數、心煩、微惡寒、腳攣急，反與桂枝，欲攻其表，此誤也。得之便厥、咽中乾、煩躁吐逆者，作甘草乾薑湯與之，以復其陽。若厥愈足溫者，更作芍藥甘草湯與之，其腳即伸；若胃氣不和譫語者，少與調胃承氣湯；若重發汗，復加燒針者，四逆湯主之。"}, {"n": 30, "j": "太陽", "t": "問曰：證象陽旦，按法治之而增劇，厥逆、咽中乾、兩脛拘急而譫語。師曰：言夜半手足當溫，兩腳當伸。後如師言，何以知此？答曰：寸口脈浮而大；浮為風，大為虛，風則生微熱，虛則兩脛攣。病形象桂枝，因加附子參其間，增桂令汗出，附子溫經，亡陽故也。厥逆、咽中乾、煩躁、陽明內結、譫語煩亂，更飲甘草乾薑湯，夜半陽氣還，兩足當熱，脛尚微拘急，重與芍藥甘草湯，爾乃脛伸；以承氣湯微溏，則止其譫語。故知病可愈。"}, {"n": 31, "j": "太陽", "t": "太陽病，項背強几几、無汗、惡風，葛根湯主之。"}, {"n": 32, "j": "太陽", "t": "太陽與陽明合病者，必自下利，葛根湯主之。"}, {"n": 33, "j": "太陽", "t": "太陽與陽明合病，不下利，但嘔者，葛根加半夏湯主之。"}, {"n": 34, "j": "太陽", "t": "太陽病，桂枝證，醫反下之，利遂不止，脈促者，表未解也；喘而汗出者，葛根黃芩黃連湯主之。"}, {"n": 35, "j": "太陽", "t": "太陽病，頭痛、發熱、身疼、腰痛、骨節疼痛、惡風、無汗而喘者，麻黃湯主之。"}, {"n": 36, "j": "太陽", "t": "太陽與陽明合病，喘而胸滿者，不可下，宜麻黃湯。"}, {"n": 37, "j": "太陽", "t": "太陽病，十日以去，脈浮細而嗜臥者，外已解也。設胸滿脅痛者，與小柴胡湯；脈但浮者，與麻黃湯。"}, {"n": 38, "j": "太陽", "t": "太陽中風，脈浮緊、發熱、惡寒、身疼痛、不汗出而煩躁者，大青龍湯主之；若脈微弱，汗出惡風者，不可服之。服之則厥逆、筋惕肉瞤，此為逆也。"}, {"n": 39, "j": "太陽", "t": "傷寒，脈浮緩，身不疼，但重，乍有輕時，無少陰證者，大青龍湯發之。"}, {"n": 40, "j": "太陽", "t": "傷寒，表不解，心下有水氣，乾嘔、發熱而咳，或渴，或利，或噎，或小便不利、少腹滿，或喘者，小青龍湯主之。"}, {"n": 41, "j": "太陽", "t": "傷寒，心下有水氣，咳而微喘、發熱不渴。服湯已，渴者，此寒去欲解也，小青龍湯主之。"}, {"n": 42, "j": "太陽", "t": "太陽病，外證未解，脈浮弱者，當以汗解，宜桂枝湯。"}, {"n": 43, "j": "太陽", "t": "太陽病，下之微喘者，表未解故也，桂枝加厚朴杏子湯主之。"}, {"n": 44, "j": "太陽", "t": "太陽病，外證未解，不可下也，下之為逆；欲解外者，宜桂枝湯。"}, {"n": 45, "j": "太陽", "t": "太陽病，先發汗不解，而復下之，脈浮者不愈。浮為在外，而反下之，故令不愈。今脈浮，故在外，當須解外則愈，宜桂枝湯。"}, {"n": 46, "j": "太陽", "t": "太陽病，脈浮緊、無汗、發熱、身疼痛，八九日不解，表證仍在，此當發其汗。服藥已微除，其人發煩，目瞑，劇者必衄，衄乃解。所以然者，陽氣重故也。麻黃湯主之。"}, {"n": 47, "j": "太陽", "t": "太陽病，脈浮緊，發熱，身無汗，自衄者愈。"}, {"n": 48, "j": "太陽", "t": "二陽併病，太陽初得病時，發其汗，汗先出不徹，因轉屬陽明，續自微汗出，不惡寒。若太陽病證不罷者，不可下，下之為逆；如此可小發汗。設面色緣緣正赤者，陽氣怫鬱在表，當解之熏之；若發汗不徹，不足言，陽氣怫鬱不得越，當汗不汗，其人躁煩，不知痛處，乍在腹中，乍在四肢，按之不可得，其人短氣但坐，以汗出不徹故也，更發汗則愈。何以知汗出不徹？以脈澀故知也。"}, {"n": 49, "j": "太陽", "t": "脈浮數者，法當汗出而愈。若下之，身重、心悸者，不可發汗，當自汗出乃解。所以然者，尺中脈微，此裏虛。須表裏實，津液自和，便自汗出愈。"}, {"n": 50, "j": "太陽", "t": "脈浮緊者，法當身疼痛，宜以汗解之；假令尺中遲者，不可發汗。何以知然？以榮氣不足，血少故也。"}, {"n": 51, "j": "太陽", "t": "脈浮者，病在表，可發汗，宜麻黃湯。"}, {"n": 52, "j": "太陽", "t": "脈浮而數者，可發汗，宜麻黃湯。"}, {"n": 53, "j": "太陽", "t": "病常自汗出者，此為榮氣和。榮氣和者，外不諧，以衛氣不共榮氣諧和故爾。以榮行脈中，衛行脈外。復發其汗，榮衛和則愈。宜桂枝湯。"}, {"n": 54, "j": "太陽", "t": "病人藏無他病，時發熱、自汗出而不愈者，此衛氣不和也。先其時發汗則愈，宜桂枝湯。"}, {"n": 55, "j": "太陽", "t": "傷寒脈浮緊，不發汗，因致衄者，麻黃湯主之。"}, {"n": 56, "j": "太陽", "t": "傷寒不大便六七日，頭痛有熱者，與承氣湯；其小便清者，知不在裏，仍在表也，當須發汗；若頭痛者必衄。宜桂枝湯。"}, {"n": 57, "j": "太陽", "t": "傷寒發汗已解，半日許復煩，脈浮數者，可更發汗，宜桂枝湯。"}, {"n": 58, "j": "太陽", "t": "凡病，若發汗，若吐，若下，若亡血，亡津液。陰陽自和者，必自愈。"}, {"n": 59, "j": "太陽", "t": "大下之後，復發汗，小便不利者，亡津液也。勿治之，得小便利，必自愈。"}, {"n": 60, "j": "太陽", "t": "下之後，復發汗，必振寒、脈微細。所以然者，以內外俱虛故也。"}, {"n": 61, "j": "太陽", "t": "下之後，復發汗，晝日煩躁不得眠，夜而安靜，不嘔、不渴，無表證，脈沉微，身無大熱者，乾薑附子湯主之。"}, {"n": 62, "j": "太陽", "t": "發汗後，身疼痛，脈沉遲者，桂枝加芍藥生薑各一兩人參三兩新加湯主之。"}, {"n": 63, "j": "太陽", "t": "發汗後，不可更行桂枝湯。汗出而喘，無大熱者，可與麻黃杏仁甘草石膏湯。"}, {"n": 64, "j": "太陽", "t": "發汗過多，其人叉手自冒心，心下悸欲得按者，桂枝甘草湯主之。"}, {"n": 65, "j": "太陽", "t": "發汗後，其人臍下悸者，欲作奔豚，茯苓桂枝甘草大棗湯主之。"}, {"n": 66, "j": "太陽", "t": "發汗後，腹脹滿者，厚朴生薑半夏甘草人參湯主之。"}, {"n": 67, "j": "太陽", "t": "傷寒，若吐、若下後，心下逆滿、氣上衝胸、起則頭眩、脈沉緊，發汗則動經，身為振振搖者，茯苓桂枝白朮甘草湯主之。"}, {"n": 68, "j": "太陽", "t": "發汗病不解，反惡寒者，虛故也，芍藥甘草附子湯主之。"}, {"n": 69, "j": "太陽", "t": "發汗，若下之，病仍不解，煩躁者，茯苓四逆湯主之。"}, {"n": 70, "j": "太陽", "t": "發汗後，惡寒者，虛故也；不惡寒，但熱者，實也，當和胃氣，與調胃承氣湯。"}, {"n": 71, "j": "太陽", "t": "太陽病，發汗後，大汗出、胃中乾、煩躁不得眠，欲得飲水者，少少與飲之，令胃氣和則愈；若脈浮、小便不利、微熱、消渴者，五苓散主之。"}, {"n": 72, "j": "太陽", "t": "發汗已，脈浮數、煩渴者，五苓散主之。"}, {"n": 73, "j": "太陽", "t": "傷寒，汗出而渴者，五苓散主之；不渴者，茯苓甘草湯主之。"}, {"n": 74, "j": "太陽", "t": "中風發熱，六七日不解而煩，有表裏證，渴欲飲水，水入則吐者，名曰水逆，五苓散主之。"}, {"n": 75, "j": "太陽", "t": "未持脈時，病人手叉自冒心。師因教試令咳而不咳者，此必兩耳聾無聞也。所以然者，以重發汗，虛故如此。發汗後，飲水多必喘；以水灌之亦喘。"}, {"n": 76, "j": "太陽", "t": "發汗後，水藥不得入口，為逆。若更發汗，必吐下不止。發汗、吐下後，虛煩不得眠；若劇者，必反復顛倒，心中懊憹，梔子豉湯主之；若少氣者，梔子甘草豉湯主之；若嘔者，梔子生薑豉湯主之。"}, {"n": 77, "j": "太陽", "t": "發汗，若下之，而煩熱胸中窒者，梔子豉湯主之。"}, {"n": 78, "j": "太陽", "t": "傷寒五六日，大下之後，身熱不去，心中結痛者，未欲解也，梔子豉湯主之。"}, {"n": 79, "j": "太陽", "t": "傷寒下後，心煩、腹滿、臥起不安者，梔子厚朴湯主之。"}, {"n": 80, "j": "太陽", "t": "傷寒，醫以丸藥大下之，身熱不去；微煩者，梔子乾薑湯主之。"}, {"n": 81, "j": "太陽", "t": "凡用梔子湯，病人舊微溏者，不可與服之。"}, {"n": 82, "j": "太陽", "t": "太陽病發汗，汗出不解，其人仍發熱，心下悸、頭眩、身瞤動，振振欲擗地者，真武湯主之。"}, {"n": 83, "j": "太陽", "t": "咽喉乾燥者，不可發汗。"}, {"n": 84, "j": "太陽", "t": "淋家，不可發汗；發汗必便血。"}, {"n": 85, "j": "太陽", "t": "瘡家，雖身疼痛，不可發汗；汗出則痙。"}, {"n": 86, "j": "太陽", "t": "衄家，不可發汗；汗出必額上陷脈急緊、直視不能眴，不得眠。"}, {"n": 87, "j": "太陽", "t": "亡血家，不可發汗；發汗則寒慄而振。"}, {"n": 88, "j": "太陽", "t": "汗家，重發汗，必恍惚心亂，小便已陰疼，與禹餘粮丸。"}, {"n": 89, "j": "太陽", "t": "病人有寒，復發汗，胃中冷，必吐蛔。"}, {"n": 90, "j": "太陽", "t": "本發汗，而復下之，此為逆也。若先發汗，治不為逆；本先下之，而反汗之，為逆；若先下之，治不為逆。"}, {"n": 91, "j": "太陽", "t": "傷寒，醫下之，續得下利清穀不止，身疼痛者，急當救裏；後身疼痛，清便自調者，急當救表。救裏宜四逆湯，救表宜桂枝湯。"}, {"n": 92, "j": "太陽", "t": "病發熱、頭痛，脈反沉，若不差，身體疼痛，當救其裏，四逆湯方。"}, {"n": 93, "j": "太陽", "t": "太陽病，先下而不愈，因復發汗。以此表裏俱虛，其人因致冒，冒家汗出自愈。所以然者，汗出表和故也。裏未和，然後復下之。"}, {"n": 94, "j": "太陽", "t": "太陽病未解，脈陰陽俱停，必先振慄，汗出而解；但陽脈微者，先汗出而解；但陰脈微者，下之而解。若欲下之，宜調胃承氣湯。"}, {"n": 95, "j": "太陽", "t": "太陽病，發熱、汗出者，此為榮弱衛強，故使汗出。欲救邪風者，宜桂枝湯。"}, {"n": 96, "j": "太陽", "t": "傷寒五六日中風，往來寒熱，胸脅苦滿、嘿嘿不欲飲食、心煩喜嘔，或胸中煩而不嘔，或渴，或腹中痛，或脅下痞硬，或心下悸、小便不利，或不渴、身有微熱，或咳者，小柴胡湯主之。"}, {"n": 97, "j": "太陽", "t": "血弱、氣盡，腠理開，邪氣因入，與正氣相搏，結於脅下。正邪分爭，往來寒熱，休作有時，嘿嘿不欲飲食，藏府相連，其痛必下，邪高痛下，故使嘔也，小柴胡湯主之。服柴胡湯已，渴者屬陽明，以法治之。"}, {"n": 98, "j": "太陽", "t": "得病六七日，脈遲浮弱、惡風寒、手足溫，醫二三下之，不能食而脅下滿痛，面目及身黃，頸項強，小便難者，與柴胡湯，後必下重。本渴飲水而嘔者，柴胡湯不中與也，食穀者噦。"}, {"n": 99, "j": "太陽", "t": "傷寒四五日，身熱、惡風、頸項強、脅下滿、手足溫而渴者，小柴胡湯主之。"}, {"n": 100, "j": "太陽", "t": "傷寒，陽脈澀，陰脈弦，法當腹中急痛，先與小建中湯；不差者，小柴胡湯主之。"}, {"n": 101, "j": "太陽", "t": "傷寒中風，有柴胡證，但見一證便是，不必悉具。凡柴胡湯病證而下之；若柴胡證不罷者，復與柴胡湯，必蒸蒸而振，卻復發熱汗出而解。"}, {"n": 102, "j": "太陽", "t": "傷寒二三日，心中悸而煩者，小建中湯主之。"}, {"n": 103, "j": "太陽", "t": "太陽病，過經十餘日，反二、三下之。後四、五日，柴胡證仍在者，先與小柴胡。嘔不止、心下急、鬱鬱微煩者，為未解也，與大柴胡湯下之則愈。"}, {"n": 104, "j": "太陽", "t": "傷寒十三日不解，胸脅滿而嘔，日晡所發潮熱，已而微利。此本柴胡證，下之以不得利；今反利者，知醫以丸藥下之，此非其治也。潮熱者，實也。先宜服小柴胡湯以解外，後以柴胡加芒消湯主之。"}, {"n": 105, "j": "太陽", "t": "傷寒十三日，過經，譫語者，以有熱也，當以湯下之。若小便利者，大便當硬，而反下利，脈調和者。知醫以丸藥下之，非其治也。若自下利者，脈當微厥，今反和者，此為內實也，調胃承氣湯主之。"}, {"n": 106, "j": "太陽", "t": "太陽病不解，熱結膀胱，其人如狂，血自下，下者愈。其外不解者，尚未可攻，當先解其外；外解已，但少腹急結者，乃可攻之，宜桃核承氣湯。"}, {"n": 107, "j": "太陽", "t": "傷寒八九日，下之，胸滿、煩驚、小便不利、譫語、一身盡重，不可轉側者，柴胡加龍骨牡蠣湯主之。"}, {"n": 108, "j": "太陽", "t": "傷寒，腹滿、譫語、寸口脈浮而緊，此肝乘脾也，名曰縱，刺期門。"}, {"n": 109, "j": "太陽", "t": "傷寒發熱，嗇嗇惡寒、大渴欲飲水，其腹必滿、自汗出、小便利、其病欲解，此肝乘肺也，名曰橫，刺期門。"}, {"n": 110, "j": "太陽", "t": "太陽病二日，反躁，凡熨其背而大汗出，大熱入胃，胃中水竭，躁煩必發譫語；十餘日振慄自下利者，此為欲解也。故其汗從腰以下不得汗，欲小便不得，反嘔、欲失溲、足下惡風、大便硬，小便當數，而反不數及不多；大便已，頭卓然而痛，其人足心必熱，穀氣下流故也。"}, {"n": 111, "j": "太陽", "t": "太陽病中風，以火劫發汗。邪風被火熱，血氣流溢，失其常度，兩陽相熏灼，其身發黃。陽盛則欲衄，陰虛小便難。陰陽俱虛竭，身體則枯燥，但頭汗出，劑頸而還。腹滿、微喘，口乾、咽爛，或不大便，久則譫語，甚者至噦、手足躁擾、捻衣摸床。小便利者，其人可治。"}, {"n": 112, "j": "太陽", "t": "傷寒脈浮，醫以火迫劫之，亡陽，必驚狂、臥起不安者，桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之。"}, {"n": 113, "j": "太陽", "t": "形作傷寒，其脈不弦緊而弱。弱者必渴，被火必譫語，弱者發熱，脈浮，解之當汗出愈。"}, {"n": 114, "j": "太陽", "t": "太陽病，以火熏之，不得汗，其人必躁；到經不解，必清血，名為火邪。"}, {"n": 115, "j": "太陽", "t": "脈浮，熱甚，而反灸之，此為實。實以虛治，因火而動，必咽燥、吐血。"}, {"n": 116, "j": "太陽", "t": "微數之脈，慎不可灸。因火為邪，則為煩逆；追虛逐實，血散脈中；火氣雖微，內攻有力，焦骨傷筋，血難復也。脈浮，宜以汗解，用火灸之，邪無從出，因火而盛，病從腰以下，必重而痹，名火逆也。欲自解者，必當先煩，煩乃有汗而解。何以知之？脈浮，故知汗出解。"}, {"n": 117, "j": "太陽", "t": "燒針令其汗，針處被寒，核起而赤者，必發奔豚。氣從少腹上衝心者，灸其核上各一壯，與桂枝加桂湯，更加桂二兩也。"}, {"n": 118, "j": "太陽", "t": "火逆下之，因燒針煩躁者，桂枝甘草龍骨牡蠣湯主之。"}, {"n": 119, "j": "太陽", "t": "太陽傷寒者，加溫針必驚也。"}, {"n": 120, "j": "太陽", "t": "太陽病，當惡寒、發熱，今自汗出，反不惡寒、發熱、關上脈細數者，以醫吐之過也。一二日吐之者，腹中飢、口不能食；三四日吐之者，不喜糜粥、欲食冷食、朝食暮吐，以醫吐之所致也，此為小逆。"}, {"n": 121, "j": "太陽", "t": "太陽病吐之，但太陽病當惡寒，今反不惡寒，不欲近衣，此為吐之內煩也。"}, {"n": 122, "j": "太陽", "t": "病人脈數。數為熱，當消穀引食。而反吐者，此以發汗，令陽氣微，膈氣虛，脈乃數也。數為客熱，不能消穀；以胃中虛冷，故吐也。"}, {"n": 123, "j": "太陽", "t": "太陽病，過經十餘日，心下溫溫欲吐而胸中痛，大便反溏，腹微滿，鬱鬱微煩。先此時自極吐下者，與調胃承氣湯；若不爾者，不可與；但欲嘔、胸中痛、微溏者，此非柴胡湯證，以嘔故知極吐下也。調胃承氣湯。"}, {"n": 124, "j": "太陽", "t": "太陽病六七日，表證仍在，脈微而沉，反不結胸；其人發狂者，以熱在下焦，少腹當硬滿，小便自利者，下血乃愈。所以然者，以太陽隨經，瘀熱在裏故也。抵當湯主之。"}, {"n": 125, "j": "太陽", "t": "太陽病，身黃、脈沉結、少腹硬、小便不利者，為無血也；小便自利，其人如狂者，血證諦也，抵當湯主之。"}, {"n": 126, "j": "太陽", "t": "傷寒有熱，少腹滿，應小便不利，今反利者，為有血也，當下之，不可餘藥，宜抵當丸。"}, {"n": 127, "j": "太陽", "t": "太陽病，小便利者，以飲水多，必心下悸；小便少者，必苦裏急也。"}, {"n": 128, "j": "太陽", "t": "問曰：病有結胸、有藏結，其狀何如？答曰：按之痛，寸脈浮、關脈沉，名曰結胸也。"}, {"n": 129, "j": "太陽", "t": "何謂藏結？答曰：如結胸狀，飲食如故、時時下利，寸脈浮、關脈小細沉緊，名曰藏結。舌上白苔滑者，難治。"}, {"n": 130, "j": "太陽", "t": "藏結，無陽證，不往來寒熱，其人反靜，舌上苔滑者，不可攻也。"}, {"n": 131, "j": "太陽", "t": "病發于陽，而反下之，熱入因作結胸；病發于陰，而反下之，因作痞也。所以成結胸者，以下之太早故也。結胸者，項亦強，如柔痙狀，下之則和，宜大陷胸丸。"}, {"n": 132, "j": "太陽", "t": "結胸證，其脈浮大者，不可下，下之則死。"}, {"n": 133, "j": "太陽", "t": "結胸證悉具，煩躁者亦死。"}, {"n": 134, "j": "太陽", "t": "太陽病，脈浮而動數，浮則為風、數則為熱、動則為痛、數則為虛；頭痛、發熱、微盜汗出，而反惡寒者，表未解也。醫反下之，動數變遲，膈內拒痛，胃中空虛，客氣動膈，短氣躁煩，心中懊憹，陽氣內陷，心下因硬，則為結胸，大陷胸湯主之。若不結胸，但頭汗出，餘處無汗，劑頸而還，小便不利，身必發黃。"}, {"n": 135, "j": "太陽", "t": "傷寒六七日，結胸熱實，脈沉而緊，心下痛，按之石硬者，大陷胸湯主之。"}, {"n": 136, "j": "太陽", "t": "傷寒十餘日，熱結在裏，復往來寒熱者，與大柴胡湯；但結胸，無大熱者，此為水結在胸脅也；但頭微汗出者，大陷胸湯主之。"}, {"n": 137, "j": "太陽", "t": "太陽病，重發汗而復下之，不大便五六日，舌上燥而渴，日晡所小有潮熱，從心下至少腹硬滿而痛不可近者，大陷胸湯主之。"}, {"n": 138, "j": "太陽", "t": "小結胸病，正在心下，按之則痛，脈浮滑者，小陷胸湯主之。"}, {"n": 139, "j": "太陽", "t": "太陽病，二三日，不能臥，但欲起，心下必結，脈微弱者，此本有寒分也。反下之，若利止，必作結胸；未止者，四日復下之；此作協熱利也。"}, {"n": 140, "j": "太陽", "t": "太陽病，下之，其脈促，不結胸者，此為欲解也；脈浮者，必結胸；脈緊者，必咽痛；脈弦者，必兩脅拘急；脈細數者，頭痛未止；脈沉緊者，必欲嘔；脈沉滑者，協熱利；脈浮滑者，必下血。"}, {"n": 141, "j": "太陽", "t": "病在陽，應以汗解之；反以冷水潠之。若灌之，其熱被劫不得去，彌更益煩，肉上粟起，意欲飲水，反不渴者，服文蛤散；若不差者，與五苓散；寒實結胸，無熱證者，與三物小陷胸湯，白散亦可服。"}, {"n": 142, "j": "太陽", "t": "太陽與少陽併病，頭項強痛，或眩冒，時如結胸，心下痞硬者，當刺大椎第一間、肺俞、肝俞，慎不可發汗；發汗則譫語、脈弦，五日譫語不止，當刺期門。"}, {"n": 143, "j": "太陽", "t": "婦人中風，發熱惡寒，經水適來，得之七八日，熱除而脈遲、身涼、胸脅下滿，如結胸狀，譫語者，此為熱入血室也，當刺期門，隨其實而取之。"}, {"n": 144, "j": "太陽", "t": "婦人中風，七八日續得寒熱，發作有時，經水適斷者，此為熱入血室，其血必結，故使如瘧狀發作有時，小柴胡湯主之。"}, {"n": 145, "j": "太陽", "t": "婦人傷寒，發熱，經水適來，晝日明了，暮則譫語，如見鬼狀者，此為熱入血室。無犯胃氣，及上二焦，必自愈。"}, {"n": 146, "j": "太陽", "t": "傷寒六七日，發熱、微惡寒、肢節煩痛、微嘔、心下支結、外證未去者，柴胡桂枝湯主之。"}, {"n": 147, "j": "太陽", "t": "傷寒五六日，已發汗而復下之，胸脅滿微結、小便不利、渴而不嘔、但頭汗出、往來寒熱、心煩者，此為未解也，柴胡桂枝乾薑湯主之。"}, {"n": 148, "j": "太陽", "t": "傷寒五六日，頭汗出、微惡寒、手足冷、心下滿、口不欲食、大便硬、脈細者，此為陽微結，必有表，復有裏也。脈沉，亦在裏也。汗出，為陽微；假令純陰結，不得復有外證，悉入在裏，此為半在裏半在外也。脈雖沉緊，不得為少陰病。所以然者，陰不得有汗，今頭汗出，故知非少陰也，可與小柴胡湯；設不了了者，得屎而解。"}, {"n": 149, "j": "太陽", "t": "傷寒五六日，嘔而發熱者，柴胡湯證具，而以他藥下之，柴胡證仍在者，復與柴胡湯。此雖已下之，不為逆，必蒸蒸而振，卻發熱汗出而解。若心下滿而硬痛者，此為結胸也，大陷胸湯主之；但滿而不痛者，此為痞，柴胡不中與之，宜半夏瀉心湯。"}, {"n": 150, "j": "太陽", "t": "太陽、少陽併病，而反下之，成結胸；心下硬，下利不止，水漿不下，其人心煩。"}, {"n": 151, "j": "太陽", "t": "脈浮而緊，而復下之，緊反入裏，則作痞。按之自濡，但氣痞耳。"}, {"n": 152, "j": "太陽", "t": "太陽中風，下利、嘔逆，表解者，乃可攻之。其人漐漐汗出，發作有時，頭痛、心下痞硬滿、引脅下痛、乾嘔、短氣、汗出不惡寒者，此表解裏未和也，十棗湯主之。"}, {"n": 153, "j": "太陽", "t": "太陽病，醫發汗，遂發熱、惡寒；因復下之，心下痞。表裏俱虛，陰陽氣並竭，無陽則陰獨。復加燒針，因胸煩、面色青黃、膚瞤者，難治；今色微黃；手足溫者，易愈。"}, {"n": 154, "j": "太陽", "t": "心下痞，按之濡，其脈關上浮者，大黃黃連瀉心湯主之。"}, {"n": 155, "j": "太陽", "t": "心下痞，而復惡寒、汗出者，附子瀉心湯主之。"}, {"n": 156, "j": "太陽", "t": "本以下之，故心下痞；與瀉心湯，痞不解。其人渴而口燥煩、小便不利者，五苓散主之。"}, {"n": 157, "j": "太陽", "t": "傷寒汗出解之後，胃中不和，心下痞硬，乾噫食臭，脅下有水氣，腹中雷鳴下利者，生薑瀉心湯主之。"}, {"n": 158, "j": "太陽", "t": "傷寒中風，醫反下之，其人下利，日數十行，穀不化，腹中雷鳴，心下痞硬而滿，乾嘔心煩不得安。醫見心下痞，謂病不盡，復下之，其痞益甚。此非結熱，但以胃中虛，客氣上逆，故使硬也。甘草瀉心湯主之。"}, {"n": 159, "j": "太陽", "t": "傷寒服湯藥，下利不止，心下痞硬，服瀉心湯已，復以他藥下之；利不止；醫以理中與之，利益甚，理中者，理中焦，此利在下焦，赤石脂禹餘粮湯主之。復不止者，當利其小便。"}, {"n": 160, "j": "太陽", "t": "傷寒吐下後，發汗，虛煩，脈甚微，八九日，心下痞硬、脅下痛、氣上衝咽喉、眩冒、經脈動惕者，久而成痿。"}, {"n": 161, "j": "太陽", "t": "傷寒發汗、若吐、若下，解後，心下痞硬，噫氣不除者，旋復代赭湯主之。"}, {"n": 162, "j": "太陽", "t": "下後，不可更行桂枝湯；若汗出而喘，無大熱者，可與麻黃杏子甘草石膏湯。"}, {"n": 163, "j": "太陽", "t": "太陽病，外證未除而數下之，遂協熱而利，利下不止，心下痞硬、表裏不解者，桂枝人參湯主之。"}, {"n": 164, "j": "太陽", "t": "傷寒大下後復發汗，心下痞、惡寒者，表未解也。不可攻痞，當先解表，表解乃可攻痞；解表宜桂枝湯，攻痞宜大黃黃連瀉心湯。"}, {"n": 165, "j": "太陽", "t": "傷寒發熱、汗出不解，心中痞硬、嘔吐而下利者，大柴胡湯主之。"}, {"n": 166, "j": "太陽", "t": "病如桂枝證，頭不痛、項不強、寸脈微浮、胸中痞硬、氣上衝喉咽不得息者，此為胸有寒也。當吐之，宜瓜蒂散。"}, {"n": 167, "j": "太陽", "t": "病脅下素有痞，連在臍旁，痛引少腹，入陰筋者，此名藏結，死。"}, {"n": 168, "j": "太陽", "t": "傷寒若吐若下後，七八日不解，熱結在裏，表裏俱熱，時時惡風、大渴、舌上乾燥而煩、欲飲水數升者，白虎加人參湯主之。"}, {"n": 169, "j": "太陽", "t": "傷寒無大熱、口燥渴、心煩、背微惡寒者，白虎加人參湯主之。"}, {"n": 170, "j": "太陽", "t": "傷寒脈浮、發熱、無汗，其表不解，不可與白虎湯。渴欲飲水，無表證者，白虎加人參湯主之。"}, {"n": 171, "j": "太陽", "t": "太陽、少陽併病，心下硬、頸項強而眩者，當刺大椎、肺俞、肝俞，慎勿下之。"}, {"n": 172, "j": "太陽", "t": "太陽與少陽合病，自下利者，與黃芩湯；若嘔者，黃芩加半夏生薑湯主之。"}, {"n": 173, "j": "太陽", "t": "傷寒，胸中有熱，胃中有邪氣，腹中痛，欲嘔吐者，黃連湯主之。"}, {"n": 174, "j": "太陽", "t": "傷寒八九日，風濕相搏，身體疼煩，不能自轉側，不嘔、不渴、脈浮虛而澀者，桂枝附子湯主之。若其人大便硬，小便自利者，去桂加白朮湯主之。"}, {"n": 175, "j": "太陽", "t": "風濕相搏，骨節疼煩，掣痛不得屈伸，近之則痛劇，汗出短氣，小便不利，惡風不欲去衣，或身微腫者，甘草附子湯主之。"}, {"n": 176, "j": "太陽", "t": "傷寒脈浮滑，此以表有熱、裏有寒，白虎湯主之。"}, {"n": 177, "j": "太陽", "t": "傷寒脈結代、心動悸，炙甘草湯主之。"}, {"n": 178, "j": "太陽", "t": "脈按之來緩，時一止復來者，名曰結。又脈來動而中止，更來小數，中有還者反動，名曰結，陰也；脈來動而中止，不能自還，因而復動者，名曰代，陰也，得此脈者必難治。"}, {"n": 179, "j": "陽明", "t": "問曰：病有太陽陽明，有正陽陽明，有少陽陽明，何謂也？答曰：太陽陽明者，脾約是也；正陽陽明者，胃家實是也；少陽陽明者，發汗、利小便已，胃中燥、煩、實、大便難是也。"}, {"n": 180, "j": "陽明", "t": "陽明之為病，胃家實是也。"}, {"n": 181, "j": "陽明", "t": "問曰：何緣得陽明病，答曰：太陽病，若發汗、若下、若利小便，此亡津液，胃中乾燥，因轉屬陽明。不更衣，內實大便難者，此名陽明也。"}, {"n": 182, "j": "陽明", "t": "問曰：陽明病外證云何？答曰：身熱、汗自出、不惡寒反惡熱也。"}, {"n": 183, "j": "陽明", "t": "問曰：病有得之一日，不發熱而惡寒者，何也？答曰：雖得之一日，惡寒將自罷，即汗出而惡熱也。"}, {"n": 184, "j": "陽明", "t": "問曰：惡寒何故自罷？答曰：陽明居中，主土也。萬物所歸，無所復傳。始雖惡寒，二日自止，此為陽明病也。"}, {"n": 185, "j": "陽明", "t": "本太陽，初得病時，發其汗，汗先出不徹，因轉屬陽明也。傷寒發熱、無汗、嘔不能食、而反汗出濈濈然者，是轉屬陽明也。"}, {"n": 186, "j": "陽明", "t": "傷寒三日，陽明脈大。"}, {"n": 187, "j": "陽明", "t": "傷寒脈浮而緩，手足自溫者，是為繫在太陰。太陰者，身當發黃；若小便自利者，不能發黃；至七八日，大便硬者，為陽明病也。"}, {"n": 188, "j": "陽明", "t": "傷寒轉繫陽明者，其人濈然微汗出也。"}, {"n": 189, "j": "陽明", "t": "陽明中風，口苦、咽乾、腹滿、微喘、發熱、惡寒、脈浮而緊。若下之，則腹滿小便難也。"}, {"n": 190, "j": "陽明", "t": "陽明病，若能食，名中風；不能食，名中寒。"}, {"n": 191, "j": "陽明", "t": "陽明病，若中寒者，不能食，小便不利，手足濈然汗出，此欲作固瘕，必大便初硬後溏。所以然者，以胃中冷，水穀不別故也。"}, {"n": 192, "j": "陽明", "t": "陽明病，初欲食，小便反不利，大便自調，其人骨節疼，翕翕如有熱狀，奄然發狂，濈然汗出而解者，此水不勝穀氣，與汗共并，脈緊則愈。"}, {"n": 193, "j": "陽明", "t": "陽明病，欲解時，從申至戍上。"}, {"n": 194, "j": "陽明", "t": "陽明病，不能食，攻其熱必噦。所以然者，胃中虛冷故也。以其人本虛，攻其熱必噦。"}, {"n": 195, "j": "陽明", "t": "陽明病，脈遲，食難用飽。飽則微煩頭眩，必小便難，此欲作穀癉，雖下之，腹滿如故。所以然者，脈遲故也。"}, {"n": 196, "j": "陽明", "t": "陽明病，法多汗，反無汗，其身如蟲行皮中狀者，此以久虛故也。"}, {"n": 197, "j": "陽明", "t": "陽明病，反無汗而小便利，二三日嘔而咳，手足厥者，必苦頭痛；若不咳、不嘔、手足不厥者，頭不痛。"}, {"n": 198, "j": "陽明", "t": "陽明病，但頭眩，不惡寒。故能食而咳，其人咽必痛；若不咳者，咽不痛。"}, {"n": 199, "j": "陽明", "t": "陽明病，無汗、小便不利、心中懊憹者，身必發黃。"}, {"n": 200, "j": "陽明", "t": "陽明病，被火，額上微汗出而小便不利者，必發黃。"}, {"n": 201, "j": "陽明", "t": "陽明病，脈浮而緊者，必潮熱發作有時；但浮者，必盜汗出。"}, {"n": 202, "j": "陽明", "t": "陽明病，口燥但欲漱水，不欲嚥者，此必衄。"}, {"n": 203, "j": "陽明", "t": "陽明病，本自汗出。醫更重發汗，病已差，尚微煩不了了者，此必大便硬故也。以亡津液，胃中乾燥，故令大便硬。當問其小便日幾行，若本小便日三四行，今日再行，故知大便不久出。今為小便數少，以津液當還入胃中，故知不久必大便也。"}, {"n": 204, "j": "陽明", "t": "傷寒嘔多，雖有陽明證，不可攻之。"}, {"n": 205, "j": "陽明", "t": "陽明病，心下硬滿者，不可攻之。攻之，利遂不止者死；利止者愈。"}, {"n": 206, "j": "陽明", "t": "陽明病，面合色赤，不可攻之。必發熱，色黃者，小便不利也。"}, {"n": 207, "j": "陽明", "t": "陽明病，不吐、不下、心煩者，可與調胃承氣湯。"}, {"n": 208, "j": "陽明", "t": "陽明病，脈遲，雖汗出不惡寒者，其身必重，短氣，腹滿而喘，有潮熱者，此外欲解，可攻裏也。手足濈然汗出者，此大便已硬也，大承氣湯主之；若汗多，微發熱惡寒者，外未解也；其熱不潮，未可與承氣湯；若腹大滿不通者，可與小承氣湯，微和胃氣，勿令至大泄下。"}, {"n": 209, "j": "陽明", "t": "陽明病，潮熱、大便微硬者，可與大承氣湯；不硬者，不可與之。若不大便六七日，恐有燥屎，欲知之法，少與小承氣湯，湯入腹中，轉失氣者，此有燥屎也，乃可攻之；若不轉失氣者，此但初頭硬，後必溏，不可攻之，攻之必脹滿，不能食也。欲飲水者，與水則噦，其後發熱者，必大便復硬而少也，以小承氣湯和之；不轉失氣者，慎不可攻也。"}, {"n": 210, "j": "陽明", "t": "夫實則譫語，虛則鄭聲。鄭聲者，重語也；直視、譫語、喘滿者死，下利者亦死。"}, {"n": 211, "j": "陽明", "t": "發汗多，若重發汗者，亡其陽，譫語，脈短者死；脈自和者不死。"}, {"n": 212, "j": "陽明", "t": "傷寒若吐、若下後，不解，不大便五六日，上至十餘日，日晡所發潮熱，不惡寒，獨語如見鬼狀；若劇者，發則不識人，循衣摸床，惕而不安，微喘直視，脈弦者生，澀者死，微者但發熱。譫語者，大承氣湯主之。若一服利，則止後服。"}, {"n": 213, "j": "陽明", "t": "陽明病，其人多汗，以津液外出，胃中燥，大便必硬，硬則譫語，小承氣湯主之。若一服譫語止者，更莫復服。"}, {"n": 214, "j": "陽明", "t": "陽明病，譫語、發潮熱、脈滑而疾者，小承氣湯主之。因與承氣湯一升，腹中轉氣者，更服一升；若不轉氣者，勿更與之。明日又不大便，脈反微澀者，裏虛也，為難治，不可更與承氣湯也。"}, {"n": 215, "j": "陽明", "t": "陽明病，譫語、有潮熱、反不能食者，胃中必有燥屎五六枚也；若能食者，但硬耳。宜大承氣湯下之。"}, {"n": 216, "j": "陽明", "t": "陽明病、下血、譫語者，此為熱入血室。但頭汗出者，刺期門，隨其實而寫之，濈然汗出則愈。"}, {"n": 217, "j": "陽明", "t": "汗出譫語者，以有燥屎在胃中，此為風也。須下者，過經乃可下之；下之若早，語言必亂，以表虛裏實故也。下之愈，宜大承氣湯。"}, {"n": 218, "j": "陽明", "t": "傷寒四五日，脈沉而喘滿。沉為在裏，而反發其汗，津液越出，大便為難；表虛裏實，久則譫語。"}, {"n": 219, "j": "陽明", "t": "三陽合病，腹滿、身重，難以轉側，口不仁、面垢、譫語、遺尿。發汗，則譫語；下之，則額上生汗、手足逆冷；若自汗出者，白虎湯主之。"}, {"n": 220, "j": "陽明", "t": "二陽併病，太陽證罷，但發潮熱，手足漐漐汗出、大便難而譫語者，下之則愈，宜大承氣湯。"}, {"n": 221, "j": "陽明", "t": "陽明病，脈浮而緊、咽燥、口苦、腹滿而喘、發熱汗出、不惡寒反惡熱、身重，若發汗則躁，心憒憒反譫語；若加溫針，必怵惕煩躁不得眠；若下之，則胃中空虛，客氣動膈，心中懊憹。舌上苔者，梔子豉湯主之。"}, {"n": 222, "j": "陽明", "t": "若渴欲飲水，口乾舌燥者，白虎加人參湯主之。"}, {"n": 223, "j": "陽明", "t": "若脈浮、發熱、渴欲飲水、小便不利者，豬苓湯主之。"}, {"n": 224, "j": "陽明", "t": "陽明病，汗出多而渴者，不可與豬苓湯。以汗多胃中燥，豬苓湯復利其小便故也。"}, {"n": 225, "j": "陽明", "t": "脈浮而遲，表熱裏寒，下利清穀者，四逆湯主之。"}, {"n": 226, "j": "陽明", "t": "若胃中虛冷，不能食者，飲水則噦。"}, {"n": 227, "j": "陽明", "t": "脈浮、發熱，口乾、鼻燥、能食者則衄。"}, {"n": 228, "j": "陽明", "t": "陽明病，下之，其外有熱，手足溫，不結胸，心中懊憹，飢不能食，但頭汗出者，梔子豉湯主之。"}, {"n": 229, "j": "陽明", "t": "陽明病，發潮熱、大便溏、小便自可、胸脅滿不去者，與小柴胡湯。"}, {"n": 230, "j": "陽明", "t": "陽明病，脅下硬滿，不大便而嘔，舌上白苔者，可與小柴胡湯。上焦得通，津液得下，胃氣因和，身濈然汗出而解。"}, {"n": 231, "j": "陽明", "t": "陽明中風，脈弦浮大，而短氣，腹都滿，脅下及心痛，久按之氣不通，鼻乾，不得汗，嗜臥，一身及目悉黃，小便難，有潮熱，時時噦，耳前後腫，刺之小差，外不解。病過十日，脈續浮者，與小柴胡湯。"}, {"n": 232, "j": "陽明", "t": "脈但浮，無餘證者，與麻黃湯。若不尿，腹滿加噦者，不治。"}, {"n": 233, "j": "陽明", "t": "陽明病，自汗出。若發汗，小便自利者，此為津液內竭，雖硬不可攻之；當須自欲大便，宜蜜煎導而通之。若土瓜根及大豬膽汁，皆可為導。"}, {"n": 234, "j": "陽明", "t": "陽明病，脈遲、汗出多、微惡寒者，表未解也，可發汗，宜桂枝湯。"}, {"n": 235, "j": "陽明", "t": "陽明病，脈浮、無汗而喘者，發汗則愈，宜麻黃湯。"}, {"n": 236, "j": "陽明", "t": "陽明病，發熱、汗出者，此為熱越，不能發黃也。但頭汗出，身無汗，劑頸而還，小便不利，渴引水漿者，此為瘀熱在裏，身必發黃，茵蔯蒿湯主之。"}, {"n": 237, "j": "陽明", "t": "陽明證，其人喜忘者，必有畜血。所以然者，本有久瘀血，故令喜忘；屎雖硬，大便反易，其色必黑者，宜抵當湯下之。"}, {"n": 238, "j": "陽明", "t": "陽明病，下之，心中懊憹而煩，胃中有燥屎者，可攻。腹微滿，初頭硬，後必溏，不可攻之。若有燥屎者，宜大承氣湯。"}, {"n": 239, "j": "陽明", "t": "病人不大便五六日，繞臍痛、煩躁、發作有時者，此有燥屎，故使不大便也。"}, {"n": 240, "j": "陽明", "t": "病人煩熱，汗出則解；又如瘧狀，日晡所發熱者，屬陽明也。脈實者，宜下之；脈浮虛者，宜發汗。下之與大承氣湯，發汗宜桂枝湯。"}, {"n": 241, "j": "陽明", "t": "大下後，六七日不大便，煩不解，腹滿痛者，此有燥屎也。所以然者，本有宿食故也，宜大承氣湯。"}, {"n": 242, "j": "陽明", "t": "病人小便不利，大便乍難乍易，時有微熱，喘冒不能臥者，有燥屎也，宜大承氣湯。"}, {"n": 243, "j": "陽明", "t": "食穀欲嘔，屬陽明也，吳茱萸湯主之。得湯反劇者，屬上焦也。"}, {"n": 244, "j": "陽明", "t": "太陽病，寸緩、關浮、尺弱，其人發熱，汗出，復惡寒，不嘔，但心下痞者，此以醫下之也。如其不下者，病人不惡寒而渴者，此轉屬陽明也。小便數者，大便必硬，不更衣十日，無所苦也。渴欲飲水，少少與之，但以法救之。渴者，宜五苓散。"}, {"n": 245, "j": "陽明", "t": "脈陽微而汗出少者，為自和也；汗出多者，為太過；陽脈實，因發其汗，出多者，亦為太過。太過者，為陽絕於裏，亡津液，大便因硬也。"}, {"n": 246, "j": "陽明", "t": "脈浮而芤，浮為陽，芤為陰；浮芤相搏，胃氣生熱，其陽則絕。"}, {"n": 247, "j": "陽明", "t": "趺陽脈浮而澀，浮則胃氣強，澀則小便數；浮澀相搏，大便則硬，其脾為約，麻子仁丸主之。"}, {"n": 248, "j": "陽明", "t": "太陽病三日，發汗不解，蒸蒸發熱者，屬胃也，調胃承氣湯主之。"}, {"n": 249, "j": "陽明", "t": "傷寒吐後，腹脹滿者，與調胃承氣湯。"}, {"n": 250, "j": "陽明", "t": "太陽病，若吐、若下、若發汗後，微煩，小便數、大便因硬者，與小承氣湯，和之愈。"}, {"n": 251, "j": "陽明", "t": "得病二三日，脈弱，無太陽柴胡證，煩躁、心下硬；至四五日，雖能食，以小承氣湯，少少與，微和之，令小安；至六日，與承氣湯一升。若不大便六七日，小便少者，雖不受食，但初頭硬，後必溏，未定成硬，攻之必溏；須小便利，屎定硬，乃可攻之，宜大承氣湯。"}, {"n": 252, "j": "陽明", "t": "傷寒六七日，目中不了了，睛不和，無表裏證，大便難，身微熱者，此為實也。急下之，宜大承氣湯。"}, {"n": 253, "j": "陽明", "t": "陽明病，發熱、汗多者，急下之，宜大承氣湯。"}, {"n": 254, "j": "陽明", "t": "發汗不解，腹滿痛者，急下之，宜大承氣湯。"}, {"n": 255, "j": "陽明", "t": "腹滿不減，減不足言，當下之，宜大承氣湯。"}, {"n": 256, "j": "陽明", "t": "陽明少陽合病，必下利。其脈不負者，為順也；負者，失也。互相克賊，名為負也。脈滑而數者，有宿食也，當下之，宜大承氣湯。"}, {"n": 257, "j": "陽明", "t": "病人無表裏證，發熱七八日，雖脈浮數者，可下之。假令已下，脈數不解，合熱則消穀喜飢，至六七日，不大便者，有瘀血，宜抵當湯。"}, {"n": 258, "j": "陽明", "t": "若脈數不解，而下不止，必協熱便膿血也。"}, {"n": 259, "j": "陽明", "t": "傷寒發汗已，身目為黃，所以然者，以寒濕在裏，不解故也。以為不可下也，於寒濕中求之。"}, {"n": 260, "j": "陽明", "t": "傷寒七八日，身黃如橘子色，小便不利，腹微滿者，茵蔯蒿湯主之。"}, {"n": 261, "j": "陽明", "t": "傷寒身黃發熱，梔子柏皮湯主之。"}, {"n": 262, "j": "陽明", "t": "傷寒瘀熱在裏，身必黃，麻黃連軺赤小豆湯主之。"}, {"n": 263, "j": "少陽", "t": "少陽之為病，口苦、咽乾、目眩也。"}, {"n": 264, "j": "少陽", "t": "少陽中風，兩耳無所聞、目赤、胸中滿而煩者，不可吐下，吐下則悸而驚。"}, {"n": 265, "j": "少陽", "t": "傷寒，脈弦細、頭痛發熱者，屬少陽。少陽不可發汗，發汗則譫語。此屬胃，胃和則愈；胃不和，煩而悸。"}, {"n": 266, "j": "少陽", "t": "本太陽病不解，轉入少陽者，脅下硬滿，乾嘔不能食，往來寒熱，尚未吐下，脈沉緊者，與小柴胡湯。"}, {"n": 267, "j": "少陽", "t": "若已吐、下、發汗、溫針，譫語，柴胡湯證罷，此為壞病。知犯何逆，以法治之。"}, {"n": 268, "j": "少陽", "t": "三陽合病，脈浮大，上關上，但欲眠睡，目合則汗。"}, {"n": 269, "j": "少陽", "t": "傷寒六七日，無大熱，其人躁煩者，此為陽去入陰故也。"}, {"n": 270, "j": "少陽", "t": "傷寒三日，三陽為盡，三陰當受邪。其人反能食而不嘔，此為三陰不受邪也。"}, {"n": 271, "j": "少陽", "t": "傷寒三日，少陽脈小者，欲已也。"}, {"n": 272, "j": "少陽", "t": "少陽病欲解時，從寅至辰上。"}, {"n": 273, "j": "太陰", "t": "太陰之為病，腹滿而吐，食不下，自利益甚，時腹自痛。若下之，必胸下結硬。"}, {"n": 274, "j": "太陰", "t": "太陰中風，四肢煩疼，陽微陰澀而長者，為欲愈。"}, {"n": 275, "j": "太陰", "t": "太陰病欲解時，從亥至丑上。"}, {"n": 276, "j": "太陰", "t": "太陰病，脈浮者，可發汗，宜桂枝湯。"}, {"n": 277, "j": "太陰", "t": "自利、不渴者，屬太陰，以其藏有寒故也，當溫之。宜服四逆輩。"}, {"n": 278, "j": "太陰", "t": "傷寒脈浮而緩，手足自溫者，繫在太陰。太陰當發身黃；若小便自利者，不能發黃。至七八日，雖暴煩下利，日十餘行，必自止。以脾家實，腐穢當去故也。"}, {"n": 279, "j": "太陰", "t": "本太陽病，醫反下之，因爾腹滿時痛者，屬太陰也，桂枝加芍藥湯主之；大實痛者，桂枝加大黃湯主之。"}, {"n": 280, "j": "太陰", "t": "太陰為病，脈弱，其人續自便利，設當行大黃、芍藥者，宜減之，以其人胃氣弱，易動故也。"}, {"n": 281, "j": "少陰", "t": "少陰之為病，脈微細，但欲寐也。"}, {"n": 282, "j": "少陰", "t": "少陰病，欲吐不吐，心煩但欲寐，五六日自利而渴者，屬少陰也。虛故引水自救；若小便色白者，少陰病形悉具；小便白者，以下焦虛有寒，不能制水，故令色白也。"}, {"n": 283, "j": "少陰", "t": "病人脈陰陽俱緊，反汗出者，亡陽也。此屬少陰，法當咽痛而復吐利。"}, {"n": 284, "j": "少陰", "t": "少陰病，咳而下利、譫語者，被火氣劫故也。小便必難，以強責少陰，汗也。"}, {"n": 285, "j": "少陰", "t": "少陰病，脈細沉數，病為在裏，不可發汗。"}, {"n": 286, "j": "少陰", "t": "少陰病，脈微，不可發汗，亡陽故也。陽已虛，尺脈弱澀者，復不可下之。"}, {"n": 287, "j": "少陰", "t": "少陰病，脈緊，至七八日自下利，脈暴微，手足反溫，脈緊反去者，為欲解也，雖煩、下利，必自愈。"}, {"n": 288, "j": "少陰", "t": "少陰病，下利，若利自止，惡寒而踡臥，手足溫者，可治。"}, {"n": 289, "j": "少陰", "t": "少陰病，惡寒而踡，時自煩，欲去衣被者，可治。"}, {"n": 290, "j": "少陰", "t": "少陰中風，脈陽微陰浮者，為欲愈。"}, {"n": 291, "j": "少陰", "t": "少陰病欲解時，從子至寅上。"}, {"n": 292, "j": "少陰", "t": "少陰病，吐、利，手足不逆冷，反發熱者，不死。脈不至者，灸少陰七壯。"}, {"n": 293, "j": "少陰", "t": "少陰病，八九日，一身手足盡熱者，以熱在膀胱，必便血也。"}, {"n": 294, "j": "少陰", "t": "少陰病，但厥，無汗，而強發之，必動其血。未知從何道出，或從口鼻，或從目出者，是名下厥上竭，為難治。"}, {"n": 295, "j": "少陰", "t": "少陰病，惡寒、身踡而利、手足逆冷者，不治。"}, {"n": 296, "j": "少陰", "t": "少陰病，吐、利、躁煩、四逆者，死。"}, {"n": 297, "j": "少陰", "t": "少陰病，下利止而頭眩，時時自冒者，死。"}, {"n": 298, "j": "少陰", "t": "少陰病，四逆、惡寒而身踡、脈不至、不煩而躁者，死。"}, {"n": 299, "j": "少陰", "t": "少陰病六七日，息高者，死。"}, {"n": 300, "j": "少陰", "t": "少陰病，脈微細沉、但欲臥、汗出不煩、自欲吐，至五六日自利，復煩躁不得臥寐者，死。"}, {"n": 301, "j": "少陰", "t": "少陰病始得之，反發熱，脈沉者，麻黃細辛附子湯主之。"}, {"n": 302, "j": "少陰", "t": "少陰病，得之二三日，麻黃附子甘草湯微發汗。以二三日無證，故微發汗也。"}, {"n": 303, "j": "少陰", "t": "少陰病，得之二三日以上，心中煩、不得臥，黃連阿膠湯主之。"}, {"n": 304, "j": "少陰", "t": "少陰病，得之一二日，口中和，其背惡寒者，當灸之，附子湯主之。"}, {"n": 305, "j": "少陰", "t": "少陰病，身體痛，手足寒，骨節痛，脈沉者，附子湯主之。"}, {"n": 306, "j": "少陰", "t": "少陰病，下利便膿血者，桃花湯主之。"}, {"n": 307, "j": "少陰", "t": "少陰病，二三日至四五日，腹痛，小便不利，下利不止，便膿血者，桃花湯主之。"}, {"n": 308, "j": "少陰", "t": "少陰病，下利便膿血者，可刺。"}, {"n": 309, "j": "少陰", "t": "少陰病，吐利，手足逆冷，煩躁欲死者，吳茱萸湯主之。"}, {"n": 310, "j": "少陰", "t": "少陰病，下利、咽痛、胸滿、心煩，豬膚湯主之。"}, {"n": 311, "j": "少陰", "t": "少陰病二三日，咽痛者，可與甘草湯；不差，與桔梗湯。"}, {"n": 312, "j": "少陰", "t": "少陰病，咽中傷、生瘡、不能語言、聲不出者，苦酒湯主之。"}, {"n": 313, "j": "少陰", "t": "少陰病，咽中痛，半夏散及湯主之。"}, {"n": 314, "j": "少陰", "t": "少陰病，下利，白通湯主之。"}, {"n": 315, "j": "少陰", "t": "少陰病，下利，脈微者，與白通湯；利不止，厥逆無脈，乾嘔，煩者，白通加豬膽汁湯主之。服湯，脈暴出者死；微續者生。"}, {"n": 316, "j": "少陰", "t": "少陰病，二三日不已，至四五日，腹痛、小便不利，四肢沉重疼痛，自下利者，此為有水氣。其人或咳，或小便利，或下利，或嘔者，真武湯主之。"}, {"n": 317, "j": "少陰", "t": "少陰病，下利清穀，裏寒外熱，手足厥逆，脈微欲絕，身反不惡寒，其人面色赤；或腹痛，或乾嘔，或咽痛，或利止脈不出者，通脈四逆湯主之。"}, {"n": 318, "j": "少陰", "t": "少陰病，四逆，其人或咳、或悸、或小便不利、或腹中痛、或泄利下重者，四逆散主之。"}, {"n": 319, "j": "少陰", "t": "少陰病，下利六七日，咳而嘔、渴，心煩、不得眠者，豬苓湯主之。"}, {"n": 320, "j": "少陰", "t": "少陰病，得之二三日，口燥咽乾者，急下之，宜大承氣湯。"}, {"n": 321, "j": "少陰", "t": "少陰病，自利清水，色純青，心下必痛，口乾燥者，可下之，宜大承氣湯。"}, {"n": 322, "j": "少陰", "t": "少陰病，六七日，腹脹、不大便者，急下之，宜大承氣湯。"}, {"n": 323, "j": "少陰", "t": "少陰病，脈沉者，急溫之，宜四逆湯。"}, {"n": 324, "j": "少陰", "t": "少陰病，飲食入口則吐；心中溫溫欲吐，復不能吐。始得之，手足寒、脈弦遲者，此胸中實，不可下也，當吐之；若膈上有寒飲，乾嘔者，不可吐也，當溫之，宜四逆湯。"}, {"n": 325, "j": "少陰", "t": "少陰病，下利，脈微澀，嘔而汗出，必數更衣，反少者，當溫其上，灸之。"}, {"n": 326, "j": "厥陰", "t": "厥陰之為病，消渴，氣上撞心，心中疼熱，飢而不欲食，食則吐蛔，下之利不止。"}, {"n": 327, "j": "厥陰", "t": "厥陰中風，脈微浮為欲愈；不浮為未愈。"}, {"n": 328, "j": "厥陰", "t": "厥陰病欲解時，從丑至卯上。"}, {"n": 329, "j": "厥陰", "t": "厥陰病，渴欲飲水者，少少與之愈。"}, {"n": 330, "j": "厥陰", "t": "諸四逆厥者，不可下之；虛家亦然。"}, {"n": 331, "j": "厥陰", "t": "傷寒先厥後發熱而利者，必自止；見厥復利。"}, {"n": 332, "j": "厥陰", "t": "傷寒，始發熱六日，厥反九日而利。凡厥利者，當不能食；今反能食者，恐為除中，食以索餅。不發熱者，知胃氣尚在，必愈。恐暴熱來出而復去也。後日脈之，其熱續在者，期之旦日夜半愈。所以然者，本發熱六日，厥反九日，復發熱三日，并前六日，亦為九日，與厥相應，故期之旦日夜半愈。後三日脈之，而脈數，其熱不罷者，此為熱氣有餘，必發癰膿也。"}, {"n": 333, "j": "厥陰", "t": "傷寒脈遲六七日，而反與黃芩湯徹其熱。脈遲為寒，今與黃芩湯復除其熱，腹中應冷，當不能食；今反能食，此名除中，必死。"}, {"n": 334, "j": "厥陰", "t": "傷寒，先厥後發熱，下利必自止。而反汗出，咽中痛者，其喉為痹。發熱無汗，而利必自止；若不止，必便膿血。便膿血者，其喉不痹。"}, {"n": 335, "j": "厥陰", "t": "傷寒一二日至四五日厥者，必發熱；前熱者，後必厥。厥深者熱亦深，厥微者熱亦微。厥應下之，而反發汗者，必口傷爛赤。"}, {"n": 336, "j": "厥陰", "t": "傷寒病，厥五日，熱亦五日，設六日當復厥；不厥者自愈。厥終不過五日，以熱五日，故知自愈。"}, {"n": 337, "j": "厥陰", "t": "凡厥者，陰陽氣不相順接，便為厥。厥者，手足逆冷者是也。"}, {"n": 338, "j": "厥陰", "t": "傷寒脈微而厥，至七八日膚冷，其人躁，無暫安時者，此為藏厥，非蛔厥也。蛔厥者，其人當吐蛔。今病者靜，而復時煩者，此為藏寒。蛔上入其膈，故煩，須臾復止；得食而嘔，又煩者，蛔聞食臭出，其人常自吐蛔。蛔厥者，烏梅丸主之。又主久利。"}, {"n": 339, "j": "厥陰", "t": "傷寒熱少微厥，指頭寒，嘿嘿不欲食，煩躁，數日，小便利，色白者，此熱除也，欲得食，其病為愈；若厥而嘔，胸脅煩滿者，其後必便血。"}, {"n": 340, "j": "厥陰", "t": "病者手足厥冷，言我不結胸，小腹滿，按之痛者，此冷結在膀胱關元也。"}, {"n": 341, "j": "厥陰", "t": "傷寒發熱四日，厥反三日，復熱四日。厥少熱多者，其病當愈；四日至七日熱不除者，必便膿血。"}, {"n": 342, "j": "厥陰", "t": "傷寒厥四日，熱反三日，復厥五日，其病為進。寒多熱少，陽氣退，故為進也。"}, {"n": 343, "j": "厥陰", "t": "傷寒六七日，脈微、手足厥冷、煩躁，灸厥陰。厥不還者，死。"}, {"n": 344, "j": "厥陰", "t": "傷寒發熱，下利、厥逆、躁不得臥者，死。"}, {"n": 345, "j": "厥陰", "t": "傷寒發熱，下利至甚，厥不止者，死。"}, {"n": 346, "j": "厥陰", "t": "傷寒六七日不利，便發熱而利，其人汗出不止者，死，有陰無陽故也。"}, {"n": 347, "j": "厥陰", "t": "傷寒五六日，不結胸，腹濡，脈虛，復厥者，不可下；此亡血，下之死。"}, {"n": 348, "j": "厥陰", "t": "發熱而厥，七日下利者，為難治。"}, {"n": 349, "j": "厥陰", "t": "傷寒脈促，手足厥逆，可灸之。"}, {"n": 350, "j": "厥陰", "t": "傷寒脈滑而厥者，裏有熱，白虎湯主之。"}, {"n": 351, "j": "厥陰", "t": "手足厥寒，脈細欲絕者，當歸四逆湯主之。"}, {"n": 352, "j": "厥陰", "t": "若其人內有久寒者，宜當歸四逆加吳茱萸生薑湯。"}, {"n": 353, "j": "厥陰", "t": "大汗出，熱不去，內拘急，四肢疼，又下利厥逆而惡寒者，四逆湯主之。"}, {"n": 354, "j": "厥陰", "t": "大汗，若大下利而厥冷者，四逆湯主之。"}, {"n": 355, "j": "厥陰", "t": "病人手足厥冷，脈乍緊者，邪結在胸中，心下滿而煩，飢不能食者，病在胸中，當須吐之，宜瓜蒂散。"}, {"n": 356, "j": "厥陰", "t": "傷寒厥而心下悸，宜先治水，當服茯苓甘草湯，卻治其厥，不爾，水漬入胃，必作利也。"}, {"n": 357, "j": "厥陰", "t": "傷寒六七日，大下後，寸脈沉而遲，手足厥逆，下部脈不至，喉咽不利，唾膿血，泄利不止者，為難治。麻黃升麻湯主之。"}, {"n": 358, "j": "厥陰", "t": "傷寒四五日，腹中痛，若轉氣下趣少腹者。此欲自利也。"}, {"n": 359, "j": "厥陰", "t": "傷寒本自寒下，醫復吐下之，寒格，更逆吐下；若食入口即吐，乾薑黃芩黃連人參湯主之。"}, {"n": 360, "j": "厥陰", "t": "下利有微熱而渴，脈弱者，今自愈。"}, {"n": 361, "j": "厥陰", "t": "下利脈數，有微熱汗出，今自愈；設復緊，為未解。"}, {"n": 362, "j": "厥陰", "t": "下利、手足厥冷、無脈者，灸之不溫，若脈不還，反微喘者，死；少陰負趺陽者，為順也。"}, {"n": 363, "j": "厥陰", "t": "下利，寸脈反浮數，尺中自澀者，必清膿血。"}, {"n": 364, "j": "厥陰", "t": "下利清穀，不可攻表；汗出必脹滿。"}, {"n": 365, "j": "厥陰", "t": "下利，脈沉弦者，下重也；脈大者，為未止；脈微弱數者，為欲自止，雖發熱不死。"}, {"n": 366, "j": "厥陰", "t": "下利脈沉而遲，其人面少赤、身有微熱、下利清穀者，必鬱冒汗出而解，病人必微厥，所以然者，其面戴陽，下虛故也。"}, {"n": 367, "j": "厥陰", "t": "下利脈數而渴者，今自愈；設不差，必清膿血，以有熱故也。"}, {"n": 368, "j": "厥陰", "t": "下利後，脈絕，手足厥冷，晬時脈還，手足溫者生；脈不還者死。"}, {"n": 369, "j": "厥陰", "t": "傷寒下利日十餘行，脈反實者，死。"}, {"n": 370, "j": "厥陰", "t": "下利清穀，裏寒外熱，汗出而厥者，通脈四逆湯主之。"}, {"n": 371, "j": "厥陰", "t": "熱利下重者，白頭翁湯主之。"}, {"n": 372, "j": "厥陰", "t": "下利腹脹滿，身體疼痛者，先溫其裏，乃攻其表；溫裏宜四逆湯，攻表宜桂枝湯。"}, {"n": 373, "j": "厥陰", "t": "下利欲飲水者，以有熱故也，白頭翁湯主之。"}, {"n": 374, "j": "厥陰", "t": "下利譫語者，有燥屎也，宜小承氣湯。"}, {"n": 375, "j": "厥陰", "t": "下利後更煩，按之心下濡者，為虛煩也，宜梔子豉湯。"}, {"n": 376, "j": "厥陰", "t": "嘔家有癰膿者，不可治嘔；膿儘自愈。"}, {"n": 377, "j": "厥陰", "t": "嘔而脈弱，小便復利，身有微熱，見厥者，難治，四逆湯主之。"}, {"n": 378, "j": "厥陰", "t": "乾嘔吐涎沫，頭痛者，吳茱萸湯主之。"}, {"n": 379, "j": "厥陰", "t": "嘔而發熱者，小柴胡湯主之。"}, {"n": 380, "j": "厥陰", "t": "傷寒，大吐、大下之，極虛，復極汗者，其人外氣怫鬱，復與之水以發其汗，因得噦。所以然者，胃中寒冷故也。"}, {"n": 381, "j": "厥陰", "t": "傷寒噦而腹滿，視其前後，知何部不利，利之即愈。"}, {"n": 382, "j": "霍亂", "t": "問曰：病有霍亂者何？答曰：嘔吐而利，此名霍亂。"}, {"n": 383, "j": "霍亂", "t": "問曰：病發熱、頭痛、身疼、惡寒、吐利者，此屬何病，答曰：此名霍亂。霍亂自吐下，又利止，復更發熱也。"}, {"n": 384, "j": "霍亂", "t": "傷寒，其脈微澀者，本是霍亂，今是傷寒，卻四五日，至陰經上，轉入陰必利。本嘔下利者，不可治也；欲似大便，而反失氣，仍不利者，此屬陽明也，便必硬，十三日愈，所以然者，經盡故也。下利後，當便硬，硬則能食者愈。今反不能食，到後經中，頗能食，復過一經能食，過之一日當愈；不愈者，不屬陽明也。"}, {"n": 385, "j": "霍亂", "t": "惡寒、脈微而復利，利止，亡血也，四逆加人參湯主之。"}, {"n": 386, "j": "霍亂", "t": "霍亂，頭痛、發熱、身疼痛、熱多欲飲水者，五苓散主之；寒多不用水者，理中丸主之。"}, {"n": 387, "j": "霍亂", "t": "吐利止而身痛不休者，當消息和解其外，宜桂枝湯小和之。"}, {"n": 388, "j": "霍亂", "t": "吐利汗出，發熱惡寒，四肢拘急，手足厥冷者，四逆湯主之。"}, {"n": 389, "j": "霍亂", "t": "既吐且利，小便復利而大汗出，下利清穀，內寒外熱，脈微欲絕者，四逆湯主之。"}, {"n": 390, "j": "霍亂", "t": "吐已下斷，汗出而厥，四肢拘急不解，脈微欲絕者，通脈四逆加豬膽汁湯主之。"}, {"n": 391, "j": "霍亂", "t": "吐、利、發汗，脈平，小煩者，以新虛不勝穀氣故也。"}, {"n": 392, "j": "差後", "t": "傷寒陰陽易之為病，其人身體重、少氣、少腹裏急，或引陰中拘攣，熱上衝胸，頭重不欲舉，眼中生花，膝脛拘急者，燒褌散主之。"}, {"n": 393, "j": "差後", "t": "大病差後勞復者，枳實梔子豉湯主之。"}, {"n": 394, "j": "差後", "t": "傷寒差以後更發熱，小柴胡湯主之；脈浮者，以汗解之；脈沉實者，以下解之。"}, {"n": 395, "j": "差後", "t": "大病差後，從腰以下有水氣者，牡蠣澤瀉散主之。"}, {"n": 396, "j": "差後", "t": "大病差後，喜唾，久不了了，胸上有寒，當以丸藥溫之，宜理中丸。"}, {"n": 397, "j": "差後", "t": "傷寒解後，虛羸少氣，氣逆欲吐，竹葉石膏湯主之。"}, {"n": 398, "j": "差後", "t": "病人脈已解，而日暮微煩。以病新差，人強與穀，脾胃氣尚弱，不能消穀，故令微煩；損穀則愈。"}];
const JINGS = ['全部','太陽','陽明','少陽','太陰','少陰','厥陰','霍亂','差後'];
let jFilter = '全部';

const $ = s => document.querySelector(s);
const shuffle = a => {a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;};
const PUNC = '，。、；：？！';
const styleText = t => t.replace(/([，。、；：？！])/g,'<span class="dot">$1</span>');

function pool(){ return jFilter==='全部' ? DATA : DATA.filter(d=>d.j===jFilter); }

// clause bank for distractors
const BANK = [];
DATA.forEach(d=>{
  d.t.split(/[，。、；：？！]/).forEach(c=>{ if([...c].length>=2) BANK.push({c:c, n:d.n}); });
});
function distractors(ans, curN, k){
  const L=[...ans].length, seen=new Set([ans]), pick=[];
  for(const span of [1,2,4,99]){
    const cand=shuffle(BANK.filter(b=>b.n!==curN && !seen.has(b.c) && Math.abs([...b.c].length-L)<=span));
    for(const b of cand){ if(pick.length>=k) break; if(!seen.has(b.c)){pick.push(b.c);seen.add(b.c);} }
    if(pick.length>=k) break;
  }
  return pick;
}

function tokenize(t){
  const out=[]; let buf='';
  for(const ch of t){
    if(PUNC.includes(ch)){ if(buf){out.push({w:true,s:buf});buf='';} out.push({w:false,s:ch}); }
    else buf+=ch;
  }
  if(buf) out.push({w:true,s:buf});
  return out;
}

/* ===== FILL MODE ===== */
let deck=[], di=0, score=0, total=0, streak=0, locked=false;
function newDeck(){ deck=shuffle(pool()); di=0; }

function renderFill(){
  locked=false;
  if(deck.length===0) newDeck();
  const item=deck[di%deck.length];
  const toks=tokenize(item.t);
  let idxs=toks.map((tk,i)=>tk.w && [...tk.s].length>=2 && [...tk.s].length<=16 ? i : -1).filter(i=>i>=0);
  if(idxs.length===0) idxs=toks.map((tk,i)=>tk.w?i:-1).filter(i=>i>=0);
  const chosen=idxs[Math.random()*idxs.length|0];
  const answer=toks[chosen].s;

  $('#fMeridian').textContent=item.j;
  $('#fNum').textContent='第'+item.n+'條';
  $('#seal').classList.remove('show');

  let html='';
  toks.forEach((tk,i)=>{
    if(i===chosen){
      const n=[...answer].length; let cells='';
      for(let k=0;k<n;k++) cells+='<span class="cell"></span>';
      html+='<span class="blank" id="theBlank" data-ans="'+answer+'">'+cells+'</span>';
    } else if(tk.w){ html+=tk.s; }
    else { html+='<span class="dot">'+tk.s+'</span>'; }
  });
  $('#passage').innerHTML=html;

  const opts=shuffle([answer, ...distractors(answer, item.n, 3)]);
  const wrap=$('#options'); wrap.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=o;
    b.onclick=()=>choose(b,o,answer);
    wrap.appendChild(b);
  });
  $('#nextBtn').classList.remove('ready');
}
function fillCells(faint){
  const blank=$('#theBlank'), chars=[...blank.dataset.ans];
  blank.classList.add('filled');
  blank.querySelectorAll('.cell').forEach((c,k)=>{ c.textContent=chars[k]||''; if(faint)c.style.color='var(--ink-faint)'; });
}
function choose(btn,val,ans){
  if(locked) return; locked=true; total++;
  document.querySelectorAll('.opt').forEach(b=>{ b.disabled=true; if(b.textContent===ans) b.classList.add('correct'); });
  if(val===ans){ score++; streak++; fillCells(false); $('#seal').classList.add('show'); }
  else { streak=0; btn.classList.add('wrong'); fillCells(true); }
  $('#scoreN').textContent=score; $('#totalN').textContent=total; $('#streakN').textContent=streak;
  $('#nextBtn').classList.add('ready');
}
$('#nextBtn').onclick=()=>{ di++; if(di%deck.length===0) deck=shuffle(pool()); renderFill(); };

/* ===== FLASH MODE ===== */
let fdeck=[], fi=0, flipped=false;
function newFlash(){ fdeck=pool(); fi=0; }
function renderFlash(){
  if(fdeck.length===0) newFlash();
  const item=fdeck[fi%fdeck.length]; flipped=false;
  $('#flMeridian').textContent=item.j;
  $('#flNum').textContent='第'+item.n+'條';
  $('#flBody').innerHTML=''; $('#flTip').style.display='block';
  $('#flCount').textContent=(fi+1)+' / '+fdeck.length;
}
$('#flashCard').onclick=()=>{
  const item=fdeck[fi%fdeck.length];
  if(!flipped){ $('#flBody').innerHTML=styleText(item.t); $('#flTip').style.display='none'; flipped=true; }
  else { $('#flBody').innerHTML=''; $('#flTip').style.display='block'; flipped=false; }
};
$('#flPrev').onclick=e=>{e.stopPropagation();fi=(fi-1+fdeck.length)%fdeck.length;renderFlash();};
$('#flNext').onclick=e=>{e.stopPropagation();fi=(fi+1)%fdeck.length;renderFlash();};
$('#flGo').onclick=e=>{
  e.stopPropagation();
  const n=parseInt($('#flJump').value,10);
  const k=fdeck.findIndex(d=>d.n===n);
  if(k>=0){ fi=k; renderFlash(); } else { $('#flJump').value=''; $('#flJump').placeholder='不在此經'; }
};

/* ===== CHIPS ===== */
function renderChips(){
  const wrap=$('#chips'); wrap.innerHTML='';
  JINGS.forEach(j=>{
    const cnt = j==='全部'?DATA.length:DATA.filter(d=>d.j===j).length;
    const b=document.createElement('button');
    b.className='chip'+(j===jFilter?' active':'');
    b.innerHTML=j+'<span class="cnt">'+cnt+'</span>';
    b.onclick=()=>{ jFilter=j; renderChips(); newDeck(); renderFill(); newFlash(); if(!$('#flashMode').classList.contains('hidden')) renderFlash(); };
    wrap.appendChild(b);
  });
}

/* ===== TABS ===== */
$('#tabFill').onclick=()=>{
  $('#tabFill').classList.add('active');$('#tabFlash').classList.remove('active');
  $('#fillMode').classList.remove('hidden');$('#flashMode').classList.add('hidden');
};
$('#tabFlash').onclick=()=>{
  $('#tabFlash').classList.add('active');$('#tabFill').classList.remove('active');
  $('#flashMode').classList.remove('hidden');$('#fillMode').classList.add('hidden');
  newFlash(); renderFlash();
};

renderChips(); newDeck(); renderFill();
</script>
</body>
